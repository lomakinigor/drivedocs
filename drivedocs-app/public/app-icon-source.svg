<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="#1a3060"/>
  <!-- Radial gradient overlay for depth -->
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#243d7a"/>
      <stop offset="100%" stop-color="#111f45"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Car body outline (white, stroke-based) -->
  <g fill="none" stroke="white" stroke-width="52" stroke-linecap="round" stroke-linejoin="round">
    <!-- Car roof/cabin -->
    <path d="M280 480 Q320 360 430 340 L600 340 Q670 340 710 390 L760 480"/>
    <!-- Car bottom chassis line -->
    <line x1="220" y1="560" x2="790" y2="560"/>
    <!-- Front -->
    <path d="M760 480 L790 540 Q800 570 790 580 L790 600"/>
    <!-- Rear -->
    <path d="M280 480 L230 540 Q215 565 220 580 L220 600"/>
    <!-- Roof line inner -->
    <path d="M310 478 Q348 382 442 364 L590 364 Q648 364 684 408 L726 478"/>
  </g>

  <!-- Front wheel -->
  <circle cx="320" cy="620" r="72" fill="none" stroke="white" stroke-width="52"/>
  <!-- Rear wheel -->
  <circle cx="700" cy="620" r="72" fill="none" stroke="white" stroke-width="52"/>

  <!-- Wheel hubs -->
  <circle cx="320" cy="620" r="20" fill="white"/>
  <circle cx="700" cy="620" r="20" fill="white"/>

  <!-- Green checkmark -->
  <g fill="none" stroke="#3ecf4a" stroke-width="72" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="570,440 650,540 800,350"/>
  </g>
</svg>
