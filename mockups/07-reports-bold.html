<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Bold — Отчёты</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --primary:#FF5722; --accent:#FFC107; --bg:#FFF8F3; --ink:#0A0A0A; --slate-500:#6B7280; --green:#00C853; }
  body { font-family: 'Inter', sans-serif; background: #d6d3d1; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'Space Grotesk'; font-weight: 700; font-size: 22px; color: #292524; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: #78716c; margin-bottom: 24px; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-family: 'Space Grotesk'; font-weight: 600; font-size: 15px; }
  .icons { display:flex; gap:6px; align-items:center; }
  .app { flex: 1; display: flex; flex-direction: column; }
  .content { flex: 1; padding: 8px 18px 14px; }
  .nav { height: 78px; background: white; border-top: 2px solid var(--ink); display: flex; padding: 8px 12px 24px; }
  .nav-i { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding: 6px; color: var(--slate-500); font-size:10px; font-weight:700; font-family:'Space Grotesk'; text-transform:uppercase; }
  .nav-i.on { color: var(--ink); }
  .nav-i.on .dot { width:5px; height:5px; border-radius:999px; background: var(--primary); margin-top:2px; }
  .nav-i svg { width:22px; height:22px; }
  .chip { display:inline-flex; align-items:center; padding: 8px 14px; border:2px solid var(--ink); border-radius:999px; font-family:'Space Grotesk'; font-weight:700; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; background:white; color: var(--ink); }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Отчёты — для бухгалтерии</div>
  <div class="sub">Bold &amp; Bright</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#0A0A0A"/><rect x="5" y="6" width="3" height="6" fill="#0A0A0A"/><rect x="10" y="3" width="3" height="9" fill="#0A0A0A"/><rect x="15" y="0" width="3" height="12" fill="#0A0A0A"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5z" fill="#0A0A0A"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#0A0A0A" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#0A0A0A"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <!-- Header -->
        <div style="margin-bottom: 14px;">
          <div style="display:inline-block; background: var(--ink); color: var(--accent); font-family:'Space Grotesk'; font-weight:700; font-size:10px; padding: 3px 10px; border-radius:999px; letter-spacing:0.04em; text-transform:uppercase; margin-bottom: 4px;">PDF · XLSX</div>
          <div style="font-family:'Space Grotesk'; font-weight:700; font-size:30px; text-transform:uppercase; letter-spacing: -0.02em;">Отчёты</div>
        </div>

        <!-- Main orange block -->
        <div style="background: var(--primary); border: 2px solid var(--ink); border-radius: 22px; padding: 18px; box-shadow: 6px 6px 0 var(--ink); margin-bottom: 14px; color: white;">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom: 12px;">
            <span style="font-family:'Space Grotesk'; font-weight:700; font-size:11px; letter-spacing:0.08em; text-transform:uppercase; opacity:0.9;">Апрель 2026 — готов</span>
            <span style="background:white; color:var(--ink); border:2px solid var(--ink); border-radius:999px; padding: 3px 10px; font-family:'Space Grotesk'; font-weight:700; font-size:10px; letter-spacing:0.04em; text-transform:uppercase;">✓ Готов</span>
          </div>
          <div style="display:flex; gap: 18px; margin-bottom: 14px;">
            <div>
              <div style="font-family:'Space Grotesk'; font-weight:700; font-size:32px; line-height:1;">28</div>
              <div style="font-family:'Space Grotesk'; font-weight:700; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; margin-top:3px; opacity:0.85;">Поездок</div>
            </div>
            <div>
              <div style="font-family:'Space Grotesk'; font-weight:700; font-size:32px; line-height:1;">612</div>
              <div style="font-family:'Space Grotesk'; font-weight:700; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; margin-top:3px; opacity:0.85;">Км</div>
            </div>
            <div>
              <div style="font-family:'Space Grotesk'; font-weight:700; font-size:32px; line-height:1;">18.4К</div>
              <div style="font-family:'Space Grotesk'; font-weight:700; font-size:9px; letter-spacing:0.06em; text-transform:uppercase; margin-top:3px; opacity:0.85;">Расходы ₽</div>
            </div>
          </div>
          <button style="width:100%; background: var(--ink); color:white; font-family:'Space Grotesk'; font-weight:700; font-size:13px; padding: 14px; border-radius: 16px; border: 2px solid var(--ink); display:flex; align-items:center; justify-content:center; gap:8px; text-transform:uppercase;">
            Выгрузить в бухгалтерию →
          </button>
        </div>

        <!-- Amber current month -->
        <div style="background: var(--accent); border: 2px solid var(--ink); border-radius: 22px; padding: 16px; margin-bottom: 16px; display:flex; align-items:center; gap:12px;">
          <div style="width: 44px; height: 44px; background: var(--ink); border:2px solid var(--ink); border-radius: 14px; display:flex; align-items:center; justify-content:center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#FFC107" stroke-width="2.6" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-family:'Space Grotesk'; font-weight:700; font-size:14px; text-transform:uppercase;">Май — текущий</div>
            <div style="font-size:12px; color: var(--ink); font-weight:600; opacity:0.7; margin-top:2px;">12 поездок · 284 км · в работе</div>
          </div>
          <span style="font-size:18px; font-weight:700;">›</span>
        </div>

        <!-- Section title -->
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
          <div style="width:6px; height:6px; background: var(--primary); border-radius:50%;"></div>
          <h2 style="font-family:'Space Grotesk'; font-weight:700; font-size:11px; letter-spacing:0.08em; text-transform:uppercase;">Архив</h2>
        </div>

        <!-- Chips -->
        <div style="display:flex; gap: 8px; flex-wrap:wrap;">
          <span class="chip">Март</span>
          <span class="chip">Февраль</span>
          <span class="chip">Январь</span>
        </div>
      </div>

      <div class="nav">
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Сегодня
        </div>
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
          Поездки
        </div>
        <div class="nav-i on">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Отчёты<div class="dot"></div>
        </div>
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Настройки
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
