<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Новый расход</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,ital@9..144,400,0;9..144,400,1;9..144,600,0;9..144,700,0&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root { --paper:#F8F5EE; --ink:#1A1816; --muted:#6B6660; --line:#E5DFD3; --accent:#B8472D; }
  body { font-family:'Source Sans 3',sans-serif; background:#d6d3d1; min-height:100vh; padding:32px 16px 64px; -webkit-font-smoothing:antialiased; color:var(--ink); }
  .wrap { max-width:480px; margin:0 auto; }
  .title { text-align:center; font-family:'Fraunces'; font-weight:700; font-size:26px; margin-bottom:4px; }
  .sub { text-align:center; font-size:13px; color:#78716c; margin-bottom:24px; font-style:italic; font-family:'Fraunces'; }
  .phone { width:390px; height:844px; background:var(--paper); border-radius:48px; border:12px solid #18181b; box-shadow:0 20px 60px rgba(0,0,0,.18); overflow:hidden; position:relative; display:flex; flex-direction:column; margin:0 auto; }
  .notch { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:120px; height:30px; background:#18181b; border-radius:18px; z-index:10; }
  .status { height:44px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; font-weight:600; font-size:15px; font-family:'Fraunces'; }
  .app { flex:1; display:flex; flex-direction:column; }
  .content { flex:1; padding:8px 22px 22px; display:flex; flex-direction:column; }
  .rule { height:1px; background:var(--ink); }
  .rule-2 { height:2px; background:var(--ink); }
  .icons { display:flex; gap:6px; align-items:center; }
  .btn-primary { width:100%; padding:16px; background:var(--ink); color:var(--paper); font-family:'Fraunces'; font-weight:600; font-size:16px; border:none; display:flex; align-items:center; justify-content:center; gap:10px; }
  .field-label { font-family:'Fraunces'; font-style:italic; font-size:12px; color:var(--muted); }
  .field-val { font-family:'Fraunces'; font-weight:600; font-size:16px; color:var(--ink); margin-top:2px; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Новый расход — Editorial</div>
  <div class="sub">учёт затрат</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#1A1816"/><rect x="5" y="6" width="3" height="6" fill="#1A1816"/><rect x="10" y="3" width="3" height="9" fill="#1A1816"/><rect x="15" y="0" width="3" height="12" fill="#1A1816"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#1A1816" opacity=".5"/><rect x="2" y="2" width="19" height="8" fill="#1A1816"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">

        <div class="rule-2" style="margin-top:4px;"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0;">
          <span style="font-family:'Fraunces'; font-weight:700; font-size:13px; letter-spacing:.18em; text-transform:uppercase;">DriveDocs</span>
          <span style="font-family:'Fraunces'; font-style:italic; font-size:11px; color:var(--muted);">Расход · новый</span>
        </div>
        <div class="rule"></div>

        <div style="padding:14px 0 4px;">
          <div style="font-family:'Fraunces'; font-style:italic; font-size:13px; color:var(--accent);">— финансы —</div>
        </div>
        <h1 style="font-family:'Fraunces'; font-weight:700; font-size:34px; line-height:.95; letter-spacing:-0.02em;">Новый расход.</h1>

        <!-- camera card -->
        <div style="border:2px solid var(--ink); padding:18px; margin-top:14px; display:flex; align-items:center; gap:14px;">
          <div style="width:46px; height:46px; border:1.5px solid var(--ink); display:flex; align-items:center; justify-content:center;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1A1816" stroke-width="1.6" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-family:'Fraunces'; font-weight:700; font-size:17px;">Сфотографировать чек</div>
            <div style="font-family:'Fraunces'; font-style:italic; font-size:12px; color:var(--muted); margin-top:2px;">распознаем сумму и дату автоматически</div>
          </div>
          <span style="font-family:'Fraunces'; font-style:italic; font-size:18px; color:var(--accent);">→</span>
        </div>

        <!-- italic divider -->
        <div style="display:flex; align-items:center; gap:10px; margin:14px 0 6px;">
          <div class="rule" style="flex:1;"></div>
          <span style="font-family:'Fraunces'; font-style:italic; font-size:13px; color:var(--muted);">— или —</span>
          <div class="rule" style="flex:1;"></div>
        </div>

        <!-- editorial form -->
        <div style="padding:10px 0; border-bottom:1px solid var(--line);">
          <div class="field-label">категория</div>
          <div class="field-val">Топливо</div>
        </div>
        <div style="padding:10px 0; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:baseline;">
          <span class="field-label">сумма</span>
          <span style="font-family:'Fraunces'; font-weight:700; font-size:38px; letter-spacing:-0.02em; line-height:1;">650 <span style="font-style:italic; font-weight:400; color:var(--muted); font-size:18px;">₽</span></span>
        </div>
        <div style="padding:10px 0; border-bottom:1px solid var(--line);">
          <div class="field-label">дата</div>
          <div class="field-val">8 мая 2026</div>
        </div>
        <div style="padding:10px 0; border-bottom:1px solid var(--ink);">
          <div class="field-label">примечание</div>
          <div class="field-val" style="font-style:italic; font-weight:400; color:var(--muted);">АЗС Лукойл, АИ-95</div>
        </div>

        <div style="flex:1;"></div>

        <button class="btn-primary">Сохранить <span style="font-style:italic;">→</span></button>

      </div>
    </div>
  </div>
</div>
</body>
</html>
