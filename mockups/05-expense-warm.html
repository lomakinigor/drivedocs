<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Новый расход (Warm)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo: oklch(52% 0.225 285);
    --indigo-soft: oklch(94% 0.044 285);
    --indigo-bg: oklch(97.5% 0.022 285);
    --slate-900:#0f172a; --slate-700:#334155; --slate-500:#64748b; --slate-400:#94a3b8; --slate-300:#cbd5e1; --slate-200:#e2e8f0; --slate-100:#f1f5f9; --slate-50:#f8fafc;
    --emerald-50:#ecfdf5; --emerald-500:#10b981; --emerald-600:#059669;
    --shadow-card:0 2px 12px oklch(22% 0.028 280/0.06);
    --shadow-soft:0 1px 3px oklch(22% 0.028 280/0.05);
    --shadow-glow:0 8px 24px oklch(52% 0.225 285/0.32);
  }
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif; background:var(--slate-50); color:var(--slate-900); -webkit-font-smoothing:antialiased; padding:32px 16px}
  .page-wrap{max-width:480px; margin:0 auto; display:flex; flex-direction:column; align-items:center; gap:18px}
  .page-title{font-family:'Sora',sans-serif; font-weight:700; font-size:18px}
  .page-subtitle{font-size:13px; color:var(--slate-500); margin-top:4px; text-align:center; max-width:380px}
  .phone{position:relative; width:390px; height:844px; background:white; border:12px solid #000; border-radius:54px; overflow:hidden; box-shadow:0 20px 60px rgba(15,23,42,0.18)}
  .notch{position:absolute; top:10px; left:50%; transform:translateX(-50%); width:120px; height:30px; background:#000; border-radius:18px; z-index:10}
  .status-bar{display:flex; justify-content:space-between; align-items:center; padding:14px 28px 6px; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; color:var(--slate-900)}
  .status-bar .icons{display:flex; gap:6px; align-items:center}
  .app{display:flex; flex-direction:column; height:calc(100% - 44px); background:var(--indigo-bg)}
  .content{flex:1; padding:18px 20px; display:flex; flex-direction:column; gap:14px}
  .card{background:white; border-radius:18px; box-shadow:var(--shadow-card); padding:14px 16px}
  .btn-primary{background:var(--indigo); color:white; border:none; font-family:'Sora',sans-serif; font-weight:600; font-size:15px; display:inline-flex; align-items:center; justify-content:center; gap:10px; cursor:pointer; box-shadow:var(--shadow-glow)}
  .field-label{font-size:11px; font-weight:600; color:var(--slate-400); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:6px}
  .icon-pill{display:inline-flex; align-items:center; justify-content:center; border-radius:12px}
  .divider{display:flex; align-items:center; gap:10px; color:var(--slate-400); font-size:12px;}
  .divider::before, .divider::after{content:""; flex:1; height:1px; background:var(--slate-200)}

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div style="text-align:center;">
    <div class="page-title">Modal — Новый расход</div>
    <div class="page-subtitle">Добавление расхода: либо сфотографировать чек (OCR), либо ввести вручную.</div>
  </div>
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="0.5" fill="#0f172a"/><rect x="5" y="6" width="3" height="6" rx="0.5" fill="#0f172a"/><rect x="10" y="3" width="3" height="9" rx="0.5" fill="#0f172a"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="#0f172a"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#0f172a"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#0f172a" opacity="0.4"/><rect x="2" y="2" width="19" height="8" rx="1.5" fill="#0f172a"/><rect x="23.5" y="4" width="2" height="4" rx="1" fill="#0f172a" opacity="0.4"/></svg>
      </div>
    </div>
    <div class="app">
      <div class="content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <h1 style="font-family:'Sora',sans-serif; font-weight:700; font-size:22px; margin:0;">Новый расход</h1>
          <button style="width:36px; height:36px; border-radius:12px; border:1px solid var(--slate-200); background:white; box-shadow:var(--shadow-soft); display:flex; align-items:center; justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <button class="card" style="border:none; cursor:pointer; padding:24px 16px; display:flex; flex-direction:column; align-items:center; gap:10px; text-align:center;">
          <div class="icon-pill" style="background:var(--emerald-50); width:64px; height:64px; border-radius:20px;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
          </div>
          <div style="font-family:'Sora',sans-serif; font-weight:700; font-size:16px;">Сфотографировать чек</div>
          <div style="font-size:12px; color:var(--slate-500);">OCR распознает сумму и категорию</div>
        </button>

        <div class="divider"><span>или</span></div>

        <div>
          <div class="field-label">Категория</div>
          <div class="card" style="display:flex; align-items:center; gap:12px; padding:12px 14px;">
            <div class="icon-pill" style="background:var(--emerald-50); width:32px; height:32px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>
            </div>
            <div style="flex:1; font-weight:600; font-size:14px;">Бензин</div>
            <span style="color:var(--slate-300);">›</span>
          </div>
        </div>

        <div>
          <div class="field-label">Сумма</div>
          <div class="card" style="padding:14px 16px;">
            <div style="display:flex; align-items:baseline; gap:6px;">
              <span style="font-family:'Sora',sans-serif; font-weight:700; font-size:34px; color:var(--slate-900); line-height:1;">650</span>
              <span style="font-family:'Sora',sans-serif; font-size:18px; color:var(--slate-400); font-weight:500;">₽</span>
            </div>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <div>
            <div class="field-label">Дата</div>
            <div class="card" style="padding:12px 14px; font-weight:500; font-size:14px;">8 мая 2026</div>
          </div>
          <div>
            <div class="field-label">Время</div>
            <div class="card" style="padding:12px 14px; font-weight:500; font-size:14px;">09:35</div>
          </div>
        </div>

        <div>
          <div class="field-label">Примечание</div>
          <div class="card" style="padding:12px 14px; color:var(--slate-400); font-size:13px;">Например, «АЗС Лукойл, 24 л»</div>
        </div>

        <div style="flex:1;"></div>
        <button class="btn-primary" style="width:100%; padding:18px; border-radius:22px;">Сохранить</button>
      </div>
    </div>
  </div>
  <div style="font-size:12px; color:var(--slate-400);">05-expense-warm.html · 390 × 844</div>
</div>
</body>
</html>
