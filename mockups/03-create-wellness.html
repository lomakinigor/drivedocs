<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Create Trip Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream:#FDF6EC; --peach:#FDE3CD; --mint:#E3EEDB; --coral:#E07A5F; --forest:#3D5A4A; --ink:#1F2926; --muted:#6B6863; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #d6d3d1; min-height: 100vh; padding: 32px 16px 64px; color: var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'DM Serif Display'; font-weight: 400; font-size: 26px; margin-bottom: 4px; }
  .title em { font-style: italic; color: var(--coral); }
  .sub { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 24px; font-style: italic; }
  .phone { width: 390px; height: 844px; background: var(--cream); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 15px; }
  .icons { display:flex; gap:6px; align-items:center; }
  .app { flex: 1; display: flex; flex-direction: column; padding: 4px 22px 24px; }
  h1.h { font-family: 'DM Serif Display'; font-weight: 400; font-size: 30px; line-height: 1.05; }
  h1.h em { font-style: italic; color: var(--coral); }
  .btn-primary { width:100%; padding: 18px; border-radius: 999px; background: var(--coral); color: white; font-weight: 600; font-size: 15px; border: none; box-shadow: 0 4px 18px rgba(224,122,95,0.35); }
  .field { background:white; border-radius:22px; padding:14px 16px; display:flex; gap:12px; align-items:center; box-shadow: 0 2px 14px rgba(31,41,38,0.05); }
  .ic { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .lbl { font-size:11px; color:var(--muted); font-style:italic; letter-spacing:0.04em; }
  .val { font-family:'DM Serif Display'; font-size:16px; color:var(--ink); margin-top:1px; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Modal — новая <em>поездка</em></div>
  <div class="sub">создание поездки с автогенерацией документов</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#1F2926"/><rect x="5" y="6" width="3" height="6" fill="#1F2926"/><rect x="10" y="3" width="3" height="9" fill="#1F2926"/><rect x="15" y="0" width="3" height="12" fill="#1F2926"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#1F2926"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#1F2926" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#1F2926"/><rect x="23.5" y="4" width="2" height="4" fill="#1F2926" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; padding: 8px 0 18px;">
        <div>
          <span style="display:inline-block; padding:5px 12px; border-radius:999px; background:var(--peach); color:var(--coral); font-size:11px; font-weight:600; letter-spacing:0.04em; font-style:italic;">новая поездка</span>
          <h1 class="h" style="margin-top:10px;">Новая <em>поездка</em></h1>
        </div>
        <button style="width:38px; height:38px; border-radius:50%; background:white; border:none; box-shadow: 0 2px 8px rgba(31,41,38,0.06); display:flex; align-items:center; justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1F2926" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
        </button>
      </div>

      <div style="display:flex; flex-direction:column; gap:10px;">
        <div class="field">
          <div class="ic" style="background:var(--mint);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3D5A4A" stroke-width="1.8" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div style="flex:1;">
            <div class="lbl">откуда</div>
            <div class="val">ул. Ленина, 14</div>
          </div>
        </div>

        <div class="field">
          <div class="ic" style="background:var(--peach);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E07A5F" stroke-width="1.8" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div style="flex:1;">
            <div class="lbl">куда</div>
            <div class="val">Химки, ТЦ Мега</div>
          </div>
        </div>

        <div style="display:flex; justify-content:center;">
          <span style="display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:999px; background:var(--peach); color:var(--coral); font-size:12px; font-weight:600; font-style:italic;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#E07A5F" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
            ~24 км по карте
          </span>
        </div>

        <div class="field">
          <div class="ic" style="background:var(--mint);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3D5A4A" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <div style="flex:1;">
            <div class="lbl">цель</div>
            <div class="val">Переговоры с партнёром</div>
          </div>
        </div>

        <div class="field">
          <div class="ic" style="background:var(--peach);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E07A5F" stroke-width="1.8" stroke-linecap="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
          </div>
          <div style="flex:1;">
            <div class="lbl">автомобиль</div>
            <div class="val">Lada Vesta · А123БВ77</div>
          </div>
        </div>
      </div>

      <div style="margin-top:auto;">
        <button class="btn-primary">Создать документы и начать</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
