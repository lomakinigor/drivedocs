<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Onboarding 2/4 (Warm)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --indigo: oklch(52% 0.225 285);
    --indigo-soft: oklch(94% 0.044 285);
    --indigo-bg: oklch(97.5% 0.022 285);
    --slate-900: #0f172a;
    --slate-700: #334155;
    --slate-500: #64748b;
    --slate-400: #94a3b8;
    --slate-300: #cbd5e1;
    --slate-200: #e2e8f0;
    --slate-100: #f1f5f9;
    --slate-50:  #f8fafc;
    --shadow-card: 0 2px 12px oklch(22% 0.028 280/0.06);
    --shadow-soft: 0 1px 3px oklch(22% 0.028 280/0.05);
    --shadow-glow: 0 8px 24px oklch(52% 0.225 285/0.32);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif; background:var(--slate-50); color:var(--slate-900); -webkit-font-smoothing:antialiased; padding:32px 16px}
  .page-wrap{max-width:480px; margin:0 auto; display:flex; flex-direction:column; align-items:center; gap:18px}
  .page-title{font-family:'Sora',sans-serif; font-weight:700; font-size:18px; color:var(--slate-900)}
  .page-subtitle{font-size:13px; color:var(--slate-500); margin-top:4px; max-width:380px; margin-left:auto; margin-right:auto}
  .phone{position:relative; width:390px; height:844px; background:white; border:12px solid #000; border-radius:54px; overflow:hidden; box-shadow:0 20px 60px rgba(15,23,42,0.18)}
  .notch{position:absolute; top:10px; left:50%; transform:translateX(-50%); width:120px; height:30px; background:#000; border-radius:18px; z-index:10}
  .status-bar{display:flex; justify-content:space-between; align-items:center; padding:14px 28px 6px; font-family:'Sora',sans-serif; font-size:14px; font-weight:600; color:var(--slate-900)}
  .status-bar .icons{display:flex; gap:6px; align-items:center}
  .app{display:flex; flex-direction:column; height:calc(100% - 44px); background:var(--indigo-bg)}
  .content{flex:1; padding:24px; display:flex; flex-direction:column}
  .btn-primary{background:var(--indigo); color:white; border:none; font-family:'Sora',sans-serif; font-weight:600; font-size:15px; display:inline-flex; align-items:center; justify-content:center; gap:10px; cursor:pointer; box-shadow:var(--shadow-glow)}
  .btn-secondary{background:white; color:var(--slate-700); border:1px solid var(--slate-200); font-family:'DM Sans',sans-serif; font-weight:500; font-size:14px; display:inline-flex; align-items:center; justify-content:center; gap:10px; cursor:pointer; box-shadow:var(--shadow-soft)}
  .phone-label{margin-top:14px; font-size:12px; color:var(--slate-400); text-align:center}
  .dots{display:flex; gap:8px; justify-content:center; margin-top:24px}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--slate-200)}
  .dot.active{background:var(--indigo); width:26px; border-radius:5px}
  .glow-circle{width:220px; height:220px; border-radius:50%; background:radial-gradient(circle, var(--indigo-soft) 0%, transparent 70%); position:relative; display:flex; align-items:center; justify-content:center; margin:0 auto}
  .doc-icon{width:108px; height:108px; border-radius:28px; background:white; box-shadow:var(--shadow-card); display:flex; align-items:center; justify-content:center; position:relative}

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div style="text-align:center;">
    <div class="page-title">Onboarding 2/4 — Документы автоматически</div>
    <div class="page-subtitle">Второй слайд знакомства. Объясняем главную ценность приложения.</div>
  </div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="0.5" fill="#0f172a"/><rect x="5" y="6" width="3" height="6" rx="0.5" fill="#0f172a"/><rect x="10" y="3" width="3" height="9" rx="0.5" fill="#0f172a"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="#0f172a"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#0f172a"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#0f172a" opacity="0.4"/><rect x="2" y="2" width="19" height="8" rx="1.5" fill="#0f172a"/><rect x="23.5" y="4" width="2" height="4" rx="1" fill="#0f172a" opacity="0.4"/></svg>
      </div>
    </div>
    <div class="app">
      <div class="content">
        <div style="display:flex; justify-content:flex-end; margin-bottom:24px;">
          <button class="btn-secondary" style="background:transparent; border:none; box-shadow:none; color:var(--slate-500); padding:8px 12px; font-size:14px;">Пропустить</button>
        </div>

        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px;">
          <div class="glow-circle">
            <div class="doc-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="oklch(52% 0.225 285)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="9" y1="13" x2="15" y2="13"/>
                <line x1="9" y1="17" x2="13" y2="17"/>
              </svg>
              <div style="position:absolute; right:-14px; bottom:-10px; width:44px; height:44px; border-radius:14px; background:var(--indigo); color:white; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-glow);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg>
              </div>
            </div>
          </div>

          <div style="text-align:center; padding:0 8px;">
            <h1 style="font-family:'Sora',sans-serif; font-weight:700; font-size:28px; color:var(--slate-900); margin:0 0 12px; line-height:1.2;">Документы — автоматически</h1>
            <p style="font-size:15px; color:var(--slate-500); line-height:1.5; margin:0;">Создаём путевой лист и маршрутный лист до начала поездки. Никаких бланков и распечаток.</p>
          </div>

          <div class="dots">
            <span class="dot"></span>
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:10px; padding-bottom:8px;">
          <button class="btn-primary" style="width:100%; padding:18px; border-radius:22px;">
            Далее
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div class="phone-label" style="position:absolute; bottom:-30px; left:0; right:0;"></div>
  </div>
  <div style="font-size:12px; color:var(--slate-400);">00-preview-warm.html · 390 × 844</div>
</div>
</body>
</html>
