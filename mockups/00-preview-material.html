<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Onboarding 2/4 (Material You)</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,600;8..144,700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAF8F6; --surface: #FFFBFE; --surface-2: #F3EDF7; --surface-3: #ECE6F0;
    --primary: #006A6A; --primary-container: #6FF7F7; --on-primary: #FFFFFF; --on-primary-container: #002020;
    --secondary: #4A6363; --secondary-container: #CCE8E7; --tertiary: #4B607C; --tertiary-container: #D3E4FF;
    --error: #BA1A1A; --error-container: #FFDAD6; --on-error-container: #410002;
    --on-surface: #191C1C; --on-surface-variant: #3F4948; --outline: #6F7979; --outline-variant: #BEC9C8;
  }
  body { font-family: 'Roboto Flex', -apple-system, sans-serif; font-variation-settings: "wght" 400; background: #d6d3d1; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; color: var(--on-surface); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-weight: 500; font-size: 22px; color: #1c1917; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: #57534e; margin-bottom: 24px; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 500; font-size: 15px; color: var(--on-surface); }
  .app { flex: 1; display: flex; flex-direction: column; }
  .content { flex: 1; padding: 8px 24px 24px; display:flex; flex-direction:column; }
  h1.h { font-weight: 400; font-size: 36px; line-height: 1.15; color: var(--on-surface); }
  .btn-primary { width:100%; padding: 16px; border-radius: 100px; background: var(--primary); color: var(--on-primary); font-weight: 500; font-size: 14px; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: 0.1px; }
  .btn-text { width:100%; padding: 14px; border-radius: 100px; background: transparent; color: var(--primary); font-weight: 500; font-size: 14px; border: none; }
  .icons { display:flex; gap:6px; align-items:center; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Onboarding 2/4 — Material You</div>
  <div class="sub">Tonal hero, dot-progress, M3 pill CTA</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#191C1C"/><rect x="5" y="6" width="3" height="6" fill="#191C1C"/><rect x="10" y="3" width="3" height="9" fill="#191C1C"/><rect x="15" y="0" width="3" height="12" fill="#191C1C"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#191C1C"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#191C1C" opacity="0.5"/><rect x="2" y="2" width="19" height="8" fill="#191C1C"/><rect x="23.5" y="4" width="2" height="4" fill="#191C1C" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">

        <!-- Top bar with skip -->
        <div style="display:flex; justify-content:flex-end; padding: 8px 0;">
          <button style="padding: 10px 16px; background:transparent; border:none; color: var(--primary); font-weight:500; font-size:14px;">Пропустить</button>
        </div>

        <!-- Hero illustration -->
        <div style="margin: 16px auto 32px; width: 280px; height: 280px; position:relative;">
          <!-- Big tonal blob -->
          <div style="position:absolute; inset:0; background: var(--primary-container); border-radius: 48% 52% 60% 40% / 50% 45% 55% 50%;"></div>
          <!-- Secondary blob -->
          <div style="position:absolute; right:-20px; top:30px; width:120px; height:120px; background: var(--tertiary-container); border-radius: 50%; opacity:0.7;"></div>
          <!-- Document card -->
          <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:130px; height:160px; background: var(--surface); border-radius: 18px; box-shadow: 0 12px 32px rgba(0,0,0,0.12); padding:16px; display:flex; flex-direction:column; gap:8px;">
            <div style="width:32px; height:40px; background: var(--secondary-container); border-radius:6px; display:flex; align-items:center; justify-content:center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#006A6A" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div style="height:6px; background:var(--surface-3); border-radius:3px; width:90%;"></div>
            <div style="height:6px; background:var(--surface-3); border-radius:3px; width:70%;"></div>
            <div style="height:6px; background:var(--surface-3); border-radius:3px; width:80%;"></div>
            <div style="margin-top:auto; height:24px; background: var(--primary-container); border-radius: 100px; display:flex; align-items:center; justify-content:center; font-size:10px; color: var(--on-primary-container); font-weight:500;">PDF готов</div>
          </div>
          <!-- Small floating doc -->
          <div style="position:absolute; left:-8px; bottom:30px; width:60px; height:74px; background: var(--surface); border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding:8px; display:flex; flex-direction:column; gap:4px; transform: rotate(-12deg);">
            <div style="height:4px; background: var(--secondary-container); border-radius:2px;"></div>
            <div style="height:4px; background: var(--surface-3); border-radius:2px; width:80%;"></div>
            <div style="height:4px; background: var(--surface-3); border-radius:2px; width:60%;"></div>
          </div>
        </div>

        <!-- Heading -->
        <h1 class="h" style="margin-bottom: 12px;">Документы — автоматически</h1>
        <div style="font-size:14px; color: var(--on-surface-variant); line-height: 1.5; margin-bottom: 24px;">Создаём путевой лист и маршрутный лист до начала поездки. Никаких бланков и распечаток.</div>

        <!-- Spacer -->
        <div style="flex:1;"></div>

        <!-- Dot progress -->
        <div style="display:flex; gap:8px; justify-content:center; margin-bottom: 24px;">
          <div style="width:8px; height:8px; border-radius:50%; background: var(--outline-variant);"></div>
          <div style="width:24px; height:8px; border-radius: 4px; background: var(--primary);"></div>
          <div style="width:8px; height:8px; border-radius:50%; background: var(--outline-variant);"></div>
          <div style="width:8px; height:8px; border-radius:50%; background: var(--outline-variant);"></div>
        </div>

        <!-- CTAs -->
        <button class="btn-primary" style="margin-bottom: 4px;">Далее</button>
        <button class="btn-text">Пропустить</button>

      </div>
    </div>
  </div>
</div>
</body>
</html>
