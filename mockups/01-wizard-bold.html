<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Bold — Wizard 5/5</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --primary:#FF5722; --accent:#FFC107; --bg:#FFF8F3; --ink:#0A0A0A; --slate-500:#6B7280; --green:#00C853; --red:#FF1744; }
  body { font-family: 'Inter', sans-serif; background: #d6d3d1; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'Space Grotesk'; font-weight: 700; font-size: 22px; color: #292524; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: #78716c; margin-bottom: 24px; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-family: 'Space Grotesk'; font-weight: 600; font-size: 15px; }
  .icons { display:flex; gap:6px; align-items:center; }
  .app { flex: 1; display: flex; flex-direction: column; }
  .content { flex: 1; padding: 12px 22px 20px; display: flex; flex-direction: column; }
  h1.h { font-family: 'Space Grotesk'; font-weight: 700; font-size: 30px; letter-spacing: -0.02em; line-height: 1.05; text-transform: uppercase; }
  .card { background: white; border-radius: 20px; padding: 14px; border: 2px solid var(--ink); }
  .btn-primary { width:100%; padding: 18px; border-radius: 22px; background: var(--ink); color: white; font-weight: 700; font-size: 15px; font-family: 'Space Grotesk'; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 6px 6px 0 var(--primary); text-transform: uppercase; }
  .btn-secondary { width:100%; padding: 14px; border-radius: 22px; background: white; color: var(--ink); font-weight: 600; font-size: 14px; border: 2px solid var(--ink); display:flex; align-items:center; justify-content:center; gap: 8px; }
  .ico-pill { width: 38px; height: 38px; border-radius: 12px; display:flex; align-items:center; justify-content:center; border: 2px solid var(--ink); flex-shrink:0; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Финал визарда 5/5 — настройка завершена</div>
  <div class="sub">Bold &amp; Bright — финальный шаг онбординга</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#0A0A0A"/><rect x="5" y="6" width="3" height="6" fill="#0A0A0A"/><rect x="10" y="3" width="3" height="9" fill="#0A0A0A"/><rect x="15" y="0" width="3" height="12" fill="#0A0A0A"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#0A0A0A"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#0A0A0A" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#0A0A0A"/><rect x="23.5" y="4" width="2" height="4" fill="#0A0A0A" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <!-- Progress 5/5 -->
        <div style="display:flex; gap:6px; margin-bottom: 20px;">
          <div style="flex:1; height: 8px; background: var(--ink); border:2px solid var(--ink); border-radius:999px;"></div>
          <div style="flex:1; height: 8px; background: var(--ink); border:2px solid var(--ink); border-radius:999px;"></div>
          <div style="flex:1; height: 8px; background: var(--ink); border:2px solid var(--ink); border-radius:999px;"></div>
          <div style="flex:1; height: 8px; background: var(--ink); border:2px solid var(--ink); border-radius:999px;"></div>
          <div style="flex:1; height: 8px; background: var(--ink); border:2px solid var(--ink); border-radius:999px;"></div>
        </div>
        <div style="font-family:'Space Grotesk'; font-weight:700; font-size:11px; letter-spacing:0.08em; color: var(--slate-500); text-transform:uppercase; margin-bottom: 14px;">Шаг 5 из 5</div>

        <!-- Green hero block -->
        <div style="background: var(--green); border: 2px solid var(--ink); border-radius: 24px; height: 140px; display:flex; align-items:center; justify-content:center; box-shadow: 6px 6px 0 var(--ink); margin-bottom: 18px;">
          <div style="width: 84px; height: 84px; background: var(--ink); border: 2px solid var(--ink); border-radius: 22px; display:flex; align-items:center; justify-content:center;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>

        <h1 class="h" style="margin-bottom: 8px;">Настройка<br>завершена</h1>
        <div style="font-size: 13px; color: var(--slate-500); font-weight: 500; margin-bottom: 16px;">Документы готовы к скачиванию</div>

        <!-- Doc cards -->
        <div style="display:flex; flex-direction:column; gap: 8px; margin-bottom: 16px;">
          <div class="card" style="display:flex; gap:12px; align-items:center;">
            <div class="ico-pill" style="background: var(--primary);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div style="flex:1;">
              <div style="font-family:'Space Grotesk'; font-weight:700; font-size:14px;">Приказ о служебном авто</div>
              <div style="font-size:11px; color: var(--slate-500); margin-top:2px;">PDF · готов</div>
            </div>
            <span style="font-size:18px; color: var(--green); font-weight:700;">✓</span>
          </div>
          <div class="card" style="display:flex; gap:12px; align-items:center;">
            <div class="ico-pill" style="background: var(--accent);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.4" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div style="flex:1;">
              <div style="font-family:'Space Grotesk'; font-weight:700; font-size:14px;">Договор аренды авто</div>
              <div style="font-size:11px; color: var(--slate-500); margin-top:2px;">PDF · готов</div>
            </div>
            <span style="font-size:18px; color: var(--green); font-weight:700;">✓</span>
          </div>
          <div class="card" style="display:flex; gap:12px; align-items:center;">
            <div class="ico-pill" style="background: var(--green);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div style="flex:1;">
              <div style="font-family:'Space Grotesk'; font-weight:700; font-size:14px;">Согласие на ПДн</div>
              <div style="font-size:11px; color: var(--slate-500); margin-top:2px;">PDF · готов</div>
            </div>
            <span style="font-size:18px; color: var(--green); font-weight:700;">✓</span>
          </div>
        </div>

        <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px;">
          <button class="btn-primary">Перейти в приложение →</button>
          <button class="btn-secondary">Скачать все (PDF)</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
