<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Отчёты</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,ital@9..144,400,0;9..144,400,1;9..144,600,0;9..144,700,0&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root { --paper:#F8F5EE; --ink:#1A1816; --muted:#6B6660; --line:#E5DFD3; --accent:#B8472D; --green:#4F6F52; }
  body { font-family:'Source Sans 3',sans-serif; background:#d6d3d1; min-height:100vh; padding:32px 16px 64px; -webkit-font-smoothing:antialiased; color:var(--ink); }
  .wrap { max-width:480px; margin:0 auto; }
  .title { text-align:center; font-family:'Fraunces'; font-weight:700; font-size:26px; margin-bottom:4px; }
  .sub { text-align:center; font-size:13px; color:#78716c; margin-bottom:24px; font-style:italic; font-family:'Fraunces'; }
  .phone { width:390px; height:844px; background:var(--paper); border-radius:48px; border:12px solid #18181b; box-shadow:0 20px 60px rgba(0,0,0,.18); overflow:hidden; position:relative; display:flex; flex-direction:column; margin:0 auto; }
  .notch { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:120px; height:30px; background:#18181b; border-radius:18px; z-index:10; }
  .status { height:44px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; font-weight:600; font-size:15px; font-family:'Fraunces'; }
  .app { flex:1; display:flex; flex-direction:column; }
  .content { flex:1; padding:8px 22px 12px; }
  .rule { height:1px; background:var(--ink); }
  .rule-2 { height:2px; background:var(--ink); }
  .icons { display:flex; gap:6px; align-items:center; }
  .btn-primary { width:100%; padding:14px; background:var(--ink); color:var(--paper); font-family:'Fraunces'; font-weight:600; font-size:15px; border:none; display:flex; align-items:center; justify-content:center; gap:10px; }
  .nav { height:78px; background:var(--paper); border-top:2px solid var(--ink); display:flex; padding:8px 12px 24px; }
  .nav-i { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px; color:var(--muted); font-size:10px; font-weight:600; font-family:'Fraunces'; letter-spacing:.04em; text-transform:uppercase; }
  .nav-i.on { color:var(--ink); }
  .nav-i svg { width:22px; height:22px; }
  .chip { display:inline-flex; align-items:center; padding:8px 14px; border:1px solid var(--ink); font-family:'Fraunces'; font-size:13px; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Отчёты — Editorial</div>
  <div class="sub">бухгалтерия</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#1A1816"/><rect x="5" y="6" width="3" height="6" fill="#1A1816"/><rect x="10" y="3" width="3" height="9" fill="#1A1816"/><rect x="15" y="0" width="3" height="12" fill="#1A1816"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#1A1816" opacity=".5"/><rect x="2" y="2" width="19" height="8" fill="#1A1816"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">

        <div class="rule-2" style="margin-top:4px;"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:5px 0;">
          <span style="font-family:'Fraunces'; font-weight:700; font-size:13px; letter-spacing:.18em; text-transform:uppercase;">DriveDocs</span>
          <span style="font-family:'Fraunces'; font-style:italic; font-size:11px; color:var(--muted);">Бухгалтерия</span>
        </div>
        <div class="rule"></div>

        <div style="padding:14px 0 4px;">
          <div style="font-family:'Fraunces'; font-style:italic; font-size:13px; color:var(--accent);">— ежемесячно —</div>
          <h1 style="font-family:'Fraunces'; font-weight:700; font-size:42px; line-height:.95; letter-spacing:-0.03em;">Отчёты.</h1>
        </div>

        <!-- main box: April -->
        <div style="border:2px solid var(--ink); padding:16px; margin-top:14px;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
              <div style="font-family:'Fraunces'; font-style:italic; font-size:12px; color:var(--green); letter-spacing:.04em; text-transform:uppercase;">— готов к отправке —</div>
              <div style="font-family:'Fraunces'; font-weight:700; font-size:38px; line-height:1; letter-spacing:-0.02em; margin-top:4px;">Апрель</div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:'Fraunces'; font-weight:700; font-size:28px; color:var(--accent); line-height:1;">23 400</div>
              <div style="font-family:'Fraunces'; font-style:italic; font-size:11px; color:var(--muted);">₽ расходов</div>
            </div>
          </div>
          <div class="rule" style="margin:14px 0 10px;"></div>
          <div style="display:flex; justify-content:space-between; font-family:'Fraunces'; font-size:13px; color:var(--muted); margin-bottom:14px;">
            <span><em style="color:var(--ink); font-weight:600;">28</em> поездок</span>
            <span><em style="color:var(--ink); font-weight:600;">1 240</em> км</span>
            <span><em style="color:var(--ink); font-weight:600;">14</em> чеков</span>
          </div>
          <button class="btn-primary">Выгрузить в бухгалтерию <span style="font-style:italic;">→</span></button>
        </div>

        <!-- May card -->
        <div style="border:1px solid var(--ink); padding:14px; margin-top:14px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div style="font-family:'Fraunces'; font-style:italic; font-size:12px; color:var(--accent);">— текущий —</div>
            <div style="font-family:'Fraunces'; font-weight:700; font-size:22px; line-height:1.1;">Май</div>
          </div>
          <div style="text-align:right;">
            <div style="font-family:'Fraunces'; font-weight:700; font-size:20px;">4 800 ₽</div>
            <div style="font-family:'Fraunces'; font-style:italic; font-size:11px; color:var(--muted);">8 поездок · 312 км</div>
          </div>
        </div>

        <!-- past months chips -->
        <div style="margin-top:18px;">
          <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <span style="font-family:'Fraunces'; font-style:italic; font-size:12px; letter-spacing:.06em; text-transform:uppercase;">— архив —</span>
            <div class="rule" style="flex:1;"></div>
          </div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <span class="chip">Март <em style="font-style:italic; color:var(--muted); margin-left:6px;">19 200 ₽</em></span>
            <span class="chip">Февраль <em style="font-style:italic; color:var(--muted); margin-left:6px;">17 800 ₽</em></span>
            <span class="chip">Январь <em style="font-style:italic; color:var(--muted); margin-left:6px;">14 500 ₽</em></span>
          </div>
        </div>

      </div>

      <div class="nav">
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Сегодня
        </div>
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
          Поездки
        </div>
        <div class="nav-i on">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Отчёты
        </div>
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Настройки
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
