<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Новая поездка</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0B0B0F;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --ink: #F5F5F7;
    --muted: rgba(245,245,247,0.55);
    --gold: #D4AF37;
    --gold-glow: rgba(212,175,55,0.35);
  }
  body { font-family: 'Inter', sans-serif; background: #1c1917; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; color: var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'Playfair Display'; font-weight: 700; font-size: 24px; color: #F5F5F7; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; font-style: italic; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #000; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px var(--gold-glow); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #000; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 15px; color: var(--ink); }
  .app { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .app::before { content:""; position:absolute; top:-200px; right:-200px; width:500px; height:500px; background: radial-gradient(circle, var(--gold-glow), transparent 60%); pointer-events:none; }
  .content { flex: 1; padding: 8px 20px 20px; position: relative; z-index: 1; display: flex; flex-direction: column; }
  .glass { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 18px; backdrop-filter: blur(20px); }
  .btn-primary { width:100%; padding: 18px; border-radius: 22px; background: linear-gradient(135deg, var(--gold) 0%, #B8941F 100%); color: #1A1410; font-weight: 700; font-size: 15px; border: none; box-shadow: 0 8px 32px var(--gold-glow); letter-spacing: 0.02em; cursor:pointer; }
  .icons { display:flex; gap:6px; align-items:center; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding: 6px 0 14px; }
  .close { width: 36px; height: 36px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--card-border); display:flex; align-items:center; justify-content:center; color: var(--ink); font-size: 18px; cursor:pointer; }
  h1.h { font-family: 'Playfair Display'; font-weight: 700; font-size: 22px; letter-spacing: -0.02em; color: var(--ink); }
  h1.h em { font-style: italic; color: var(--gold); font-weight: 500; }
  .label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
  .field { padding: 14px; display:flex; align-items:center; gap: 10px; }
  .field input, .field .val { flex:1; background: none; border: none; color: var(--ink); font-size: 14px; font-family: inherit; outline: none; font-weight: 500; }
  .pin { width: 32px; height: 32px; border-radius: 10px; background: rgba(212,175,55,0.12); border: 1px solid rgba(212,175,55,0.3); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .pin.green { background: rgba(52,211,153,0.12); border-color: rgba(52,211,153,0.3); }
  .info { font-size: 12px; color: var(--muted); padding: 8px 14px 0; font-style: italic; }
  .group { margin-bottom: 14px; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Новая поездка — Dark Premium</div>
  <div class="sub">Modal-форма создания поездки</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#F5F5F7"/><rect x="5" y="6" width="3" height="6" fill="#F5F5F7"/><rect x="10" y="3" width="3" height="9" fill="#F5F5F7"/><rect x="15" y="0" width="3" height="12" fill="#F5F5F7"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#F5F5F7"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#F5F5F7" opacity="0.5"/><rect x="2" y="2" width="19" height="8" fill="#F5F5F7"/><rect x="23.5" y="4" width="2" height="4" fill="#F5F5F7" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <div class="modal-header">
          <h1 class="h">Новая <em>поездка</em></h1>
          <button class="close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="group">
          <div class="label">Откуда</div>
          <div class="glass field">
            <div class="pin green">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34D399" stroke-width="2"><circle cx="12" cy="12" r="4"/></svg>
            </div>
            <div class="val">ул. Ленина 5, Москва</div>
          </div>
        </div>

        <div class="group">
          <div class="label">Куда</div>
          <div class="glass field">
            <div class="pin">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div class="val">пр. Победы 10, Химки</div>
          </div>
          <div class="info">~24 км по карте</div>
        </div>

        <div class="group">
          <div class="label">Цель</div>
          <div class="glass field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
            <div class="val">Переговоры с партнёром</div>
          </div>
        </div>

        <div class="group">
          <div class="label">Автомобиль</div>
          <div class="glass field">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
            <div class="val">Toyota Camry · А123АА</div>
            <span style="color: var(--muted);">›</span>
          </div>
        </div>

        <div style="flex:1;"></div>

        <button class="btn-primary">Создать документы и начать</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
