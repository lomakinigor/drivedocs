<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — New Expense Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream:#FDF6EC; --peach:#FDE3CD; --mint:#E3EEDB; --coral:#E07A5F; --forest:#3D5A4A; --ink:#1F2926; --muted:#6B6863; }
  body { font-family:'Plus Jakarta Sans', sans-serif; background:#d6d3d1; min-height:100vh; padding: 32px 16px 64px; color:var(--ink); }
  .wrap { max-width:480px; margin:0 auto; }
  .title { text-align:center; font-family:'DM Serif Display'; font-weight:400; font-size:26px; margin-bottom:4px; }
  .title em { font-style:italic; color:var(--coral); }
  .sub { text-align:center; font-size:13px; color:var(--muted); margin-bottom:24px; font-style:italic; }
  .phone { width:390px; height:844px; background:var(--cream); border-radius:48px; border:12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow:hidden; position:relative; display:flex; flex-direction:column; margin:0 auto; }
  .notch { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:120px; height:30px; background:#18181b; border-radius:18px; z-index:10; }
  .status { height:44px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; font-weight:600; font-size:15px; }
  .icons { display:flex; gap:6px; align-items:center; }
  .app { flex:1; display:flex; flex-direction:column; padding: 4px 22px 24px; }
  h1.h { font-family:'DM Serif Display'; font-weight:400; font-size:30px; line-height:1.05; }
  h1.h em { font-style:italic; color:var(--coral); }
  .btn-primary { width:100%; padding:18px; border-radius:999px; background:var(--coral); color:white; font-weight:600; font-size:15px; border:none; box-shadow: 0 4px 18px rgba(224,122,95,0.35); }
  .field { background:white; border-radius:18px; padding:12px 14px; display:flex; gap:12px; align-items:center; box-shadow: 0 2px 10px rgba(31,41,38,0.04); }
  .lbl { font-size:11px; color:var(--muted); font-style:italic; letter-spacing:0.04em; }
  .val { font-family:'DM Serif Display'; font-size:15px; color:var(--ink); margin-top:1px; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Modal — новый <em>расход</em></div>
  <div class="sub">фото чека или ввод вручную</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#1F2926"/><rect x="5" y="6" width="3" height="6" fill="#1F2926"/><rect x="10" y="3" width="3" height="9" fill="#1F2926"/><rect x="15" y="0" width="3" height="12" fill="#1F2926"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#1F2926"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#1F2926" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#1F2926"/><rect x="23.5" y="4" width="2" height="4" fill="#1F2926" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; padding:6px 0 14px;">
        <div>
          <span style="display:inline-block; padding:5px 12px; border-radius:999px; background:var(--mint); color:var(--forest); font-size:11px; font-weight:600; letter-spacing:0.04em; font-style:italic;">расходы</span>
          <h1 class="h" style="margin-top:8px;">Новый <em>расход</em></h1>
        </div>
        <button style="width:38px; height:38px; border-radius:50%; background:white; border:none; box-shadow: 0 2px 8px rgba(31,41,38,0.06); display:flex; align-items:center; justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1F2926" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
        </button>
      </div>

      <button style="background:var(--mint); border:none; border-radius:24px; padding:24px 18px; display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; cursor:pointer;">
        <div style="width:64px; height:64px; border-radius:50%; background:white; display:flex; align-items:center; justify-content:center; box-shadow: 0 4px 14px rgba(61,90,74,0.12);">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3D5A4A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        <div style="font-family:'DM Serif Display'; font-size:18px; color:var(--ink);">Сфотографировать чек</div>
        <div style="font-size:12px; color:var(--forest); font-style:italic;">распознаем сумму и категорию</div>
      </button>

      <div style="text-align:center; margin: 14px 0 12px;">
        <span style="font-family:'DM Serif Display'; font-style:italic; font-size:13px; color:var(--coral);">— или —</span>
      </div>

      <div style="display:flex; flex-direction:column; gap:8px;">
        <div class="field">
          <div style="width:32px; height:32px; border-radius:50%; background:var(--peach); display:flex; align-items:center; justify-content:center;">
            <span style="font-size:16px;">⛽</span>
          </div>
          <div style="flex:1;">
            <div class="lbl">категория</div>
            <div class="val">Бензин</div>
          </div>
          <span style="color:var(--muted); font-size:18px;">›</span>
        </div>

        <div style="background:white; border-radius:18px; padding:14px 16px; box-shadow: 0 2px 10px rgba(31,41,38,0.04);">
          <div class="lbl" style="margin-bottom:4px;">сумма</div>
          <div style="display:flex; align-items:baseline; gap:6px;">
            <div style="font-family:'DM Serif Display'; font-size:42px; line-height:1; color:var(--ink);">700</div>
            <div style="font-family:'DM Serif Display'; font-size:24px; color:var(--coral); font-style:italic;">₽</div>
          </div>
        </div>

        <div class="field">
          <div style="width:32px; height:32px; border-radius:50%; background:var(--mint); display:flex; align-items:center; justify-content:center;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3D5A4A" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div style="flex:1;">
            <div class="lbl">дата</div>
            <div class="val">8 мая 2026, 09:24</div>
          </div>
        </div>

        <div class="field">
          <div style="width:32px; height:32px; border-radius:50%; background:var(--peach); display:flex; align-items:center; justify-content:center;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E07A5F" stroke-width="2" stroke-linecap="round"><path d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5"/><path d="M17.5 3.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 8.5-8.5z"/></svg>
          </div>
          <div style="flex:1;">
            <div class="lbl">примечание</div>
            <div class="val" style="color:var(--muted); font-style:italic;">по пути в Химки</div>
          </div>
        </div>
      </div>

      <div style="margin-top:auto;">
        <button class="btn-primary">Сохранить</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
