<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Wizard 5/5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAFAFA; --ink: #0A0A0A; --line: #E5E5E5; --line-soft: #F0F0F0;
    --muted: #737373; --muted-2: #A3A3A3; --accent: #2563EB; --green:#16A34A;
  }
  body { font-family: 'Inter', sans-serif; background: #f5f5f4; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; color: var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-weight: 600; font-size: 20px; color: #171717; margin-bottom: 4px; letter-spacing: -0.01em; }
  .sub { text-align: center; font-size: 13px; color: #737373; margin-bottom: 24px; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 15px; color: var(--ink); }
  .icons { display:flex; gap:6px; align-items:center; }
  .app { flex: 1; display: flex; flex-direction: column; padding: 16px 24px 24px; }
  .btn-primary { width:100%; padding: 16px; border-radius: 14px; background: var(--ink); color: white; font-weight: 500; font-size: 15px; border: none; }
  .btn-secondary { width:100%; padding: 14px; border-radius: 14px; background: white; color: var(--ink); font-weight: 500; font-size: 14px; border: 1px solid var(--line); }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Wizard 5/5 — Modern Minimal</div>
  <div class="sub">Финал настройки предприятия</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#0A0A0A"/><rect x="5" y="6" width="3" height="6" fill="#0A0A0A"/><rect x="10" y="3" width="3" height="9" fill="#0A0A0A"/><rect x="15" y="0" width="3" height="12" fill="#0A0A0A"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#0A0A0A" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#0A0A0A"/><rect x="23.5" y="4" width="2" height="4" fill="#0A0A0A" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div style="margin-bottom: 28px;">
        <div style="height: 2px; background: var(--line-soft); border-radius:2px; overflow:hidden; margin-bottom: 8px;">
          <div style="width:100%; height:100%; background: var(--ink);"></div>
        </div>
        <div style="font-size: 12px; color: var(--muted); font-weight:500;">Шаг 5 из 5</div>
      </div>

      <div style="display:flex; flex-direction:column; align-items:center; text-align:center; margin-bottom: 28px;">
        <div style="width: 64px; height: 64px; border-radius:999px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; margin-bottom: 20px;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1 style="font-weight:600; font-size:24px; letter-spacing:-0.02em; margin-bottom: 8px;">Настройка завершена</h1>
        <p style="font-size:14px; color:var(--muted);">Документы предприятия готовы</p>
      </div>

      <div style="border-top:1px solid var(--line-soft); margin-bottom: 24px;">
        <div style="display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--line-soft);">
          <div style="width:32px; height:40px; border:1px solid var(--line); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:var(--muted);">PDF</div>
          <div style="flex:1;">
            <div style="font-weight:500; font-size:14px;">Приказ о назначении</div>
            <div style="font-size:12px; color:var(--muted); margin-top:2px;">Ответственный за БДД</div>
          </div>
          <span style="color:var(--muted-2); font-size:14px;">→</span>
        </div>
        <div style="display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--line-soft);">
          <div style="width:32px; height:40px; border:1px solid var(--line); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:var(--muted);">PDF</div>
          <div style="flex:1;">
            <div style="font-weight:500; font-size:14px;">Договор аренды ТС</div>
            <div style="font-size:12px; color:var(--muted); margin-top:2px;">Toyota Camry · А123АА</div>
          </div>
          <span style="color:var(--muted-2); font-size:14px;">→</span>
        </div>
        <div style="display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--line-soft);">
          <div style="width:32px; height:40px; border:1px solid var(--line); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:var(--muted);">PDF</div>
          <div style="flex:1;">
            <div style="font-weight:500; font-size:14px;">Согласие на обработку</div>
            <div style="font-size:12px; color:var(--muted); margin-top:2px;">152-ФЗ</div>
          </div>
          <span style="color:var(--muted-2); font-size:14px;">→</span>
        </div>
      </div>

      <div style="margin-top: auto;">
        <button class="btn-primary" style="margin-bottom: 8px;">Перейти в приложение</button>
        <button class="btn-secondary">Скачать все (PDF)</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
