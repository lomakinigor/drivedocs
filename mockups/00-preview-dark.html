<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Onboarding 2/4</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0B0B0F;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --ink: #F5F5F7;
    --muted: rgba(245,245,247,0.55);
    --gold: #D4AF37;
    --gold-glow: rgba(212,175,55,0.35);
  }
  body { font-family: 'Inter', sans-serif; background: #1c1917; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; color: var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'Playfair Display'; font-weight: 700; font-size: 24px; color: #F5F5F7; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; font-style: italic; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #000; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px var(--gold-glow); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #000; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 15px; color: var(--ink); }
  .app { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .app::before { content:""; position:absolute; top:-200px; right:-200px; width:500px; height:500px; background: radial-gradient(circle, var(--gold-glow), transparent 60%); pointer-events:none; }
  .app::after { content:""; position:absolute; bottom:-150px; left:-150px; width:400px; height:400px; background: radial-gradient(circle, rgba(212,175,55,0.18), transparent 60%); pointer-events:none; }
  .content { flex: 1; padding: 24px 28px 28px; position: relative; z-index: 1; display: flex; flex-direction: column; }
  .btn-primary { width:100%; padding: 18px; border-radius: 22px; background: linear-gradient(135deg, var(--gold) 0%, #B8941F 100%); color: #1A1410; font-weight: 700; font-size: 15px; border: none; box-shadow: 0 8px 32px var(--gold-glow); letter-spacing: 0.02em; cursor:pointer; }
  .ghost { background:none; border:none; color: var(--muted); font-size: 14px; padding: 14px; width:100%; cursor:pointer; font-family: inherit; }
  .icons { display:flex; gap:6px; align-items:center; }
  .hero { flex:1; display:flex; align-items:center; justify-content:center; }
  .hero-circle { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, rgba(212,175,55,0.35), rgba(212,175,55,0.05) 70%); display:flex; align-items:center; justify-content:center; position: relative; }
  .hero-circle::before { content:""; position:absolute; inset: 30px; border-radius: 50%; border: 1px solid rgba(212,175,55,0.25); }
  .hero-circle::after { content:""; position:absolute; inset: 60px; border-radius: 50%; border: 1px solid rgba(212,175,55,0.15); }
  .dots { display: flex; gap: 8px; justify-content:center; margin: 20px 0 18px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.18); }
  .dot.on { background: var(--gold); width: 24px; border-radius: 4px; box-shadow: 0 0 12px var(--gold-glow); }
  h1.h { font-family: 'Playfair Display'; font-weight: 700; font-size: 30px; letter-spacing: -0.02em; color: var(--ink); text-align:center; line-height: 1.1; }
  h1.h em { font-style: italic; color: var(--gold); font-weight: 500; }
  .desc { text-align:center; font-size: 14px; color: var(--muted); margin-top: 14px; line-height: 1.5; padding: 0 8px; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Onboarding 2/4 — Dark Premium</div>
  <div class="sub">Слайд про автоматические документы</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#F5F5F7"/><rect x="5" y="6" width="3" height="6" fill="#F5F5F7"/><rect x="10" y="3" width="3" height="9" fill="#F5F5F7"/><rect x="15" y="0" width="3" height="12" fill="#F5F5F7"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#F5F5F7"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#F5F5F7" opacity="0.5"/><rect x="2" y="2" width="19" height="8" fill="#F5F5F7"/><rect x="23.5" y="4" width="2" height="4" fill="#F5F5F7" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <div class="hero">
          <div class="hero-circle">
            <svg width="76" height="76" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <path d="M9 13l2 2 4-4"/>
            </svg>
          </div>
        </div>

        <div class="dots">
          <span class="dot"></span>
          <span class="dot on"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <h1 class="h">Документы — <em>автоматически</em></h1>
        <p class="desc">Создаём путевой лист и маршрутный лист до начала поездки. Никаких бланков и распечаток.</p>

        <div style="margin-top: 22px;">
          <button class="btn-primary">Далее</button>
          <button class="ghost">Пропустить</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
