<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Bold — Новая поездка</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --primary:#FF5722; --accent:#FFC107; --bg:#FFF8F3; --ink:#0A0A0A; --slate-500:#6B7280; --slate-300:#D1D5DB; --green:#00C853; }
  body { font-family: 'Inter', sans-serif; background: #d6d3d1; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'Space Grotesk'; font-weight: 700; font-size: 22px; color: #292524; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: #78716c; margin-bottom: 24px; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-family: 'Space Grotesk'; font-weight: 600; font-size: 15px; }
  .icons { display:flex; gap:6px; align-items:center; }
  .app { flex: 1; display: flex; flex-direction: column; }
  .content { flex: 1; padding: 6px 22px 22px; display: flex; flex-direction: column; }
  h1.h { font-family: 'Space Grotesk'; font-weight: 700; font-size: 26px; letter-spacing: -0.02em; text-transform: uppercase; }
  .field { background: white; border: 2px solid var(--ink); border-radius: 20px; padding: 12px 14px; display:flex; gap:12px; align-items:center; }
  .pin { width: 44px; height: 44px; border-radius: 14px; border: 2px solid var(--ink); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .label { font-family:'Space Grotesk'; font-weight:700; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color: var(--slate-500); }
  .value { font-family:'Space Grotesk'; font-weight:700; font-size:15px; color: var(--ink); margin-top: 2px; }
  .btn-primary { width:100%; padding: 18px; border-radius: 22px; background: var(--ink); color: white; font-weight: 700; font-size: 16px; font-family: 'Space Grotesk'; border: none; display:flex; align-items:center; justify-content:center; gap: 10px; box-shadow: 6px 6px 0 var(--primary); text-transform:uppercase; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Modal — новая поездка</div>
  <div class="sub">Bold &amp; Bright — создание поездки</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#0A0A0A"/><rect x="5" y="6" width="3" height="6" fill="#0A0A0A"/><rect x="10" y="3" width="3" height="9" fill="#0A0A0A"/><rect x="15" y="0" width="3" height="12" fill="#0A0A0A"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 8-12 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#0A0A0A"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#0A0A0A" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#0A0A0A"/><rect x="23.5" y="4" width="2" height="4" fill="#0A0A0A" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <!-- Header with X -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 18px;">
          <h1 class="h">Новая<br>поездка</h1>
          <button style="width:44px; height:44px; border-radius:14px; background:white; border:2px solid var(--ink); display:flex; align-items:center; justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.6" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Откуда -->
        <div class="field" style="margin-bottom: 10px;">
          <div class="pin" style="background: var(--primary);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.6" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div style="flex:1; min-width:0;">
            <div class="label">Откуда</div>
            <div class="value">ул. Ленина, 12</div>
          </div>
        </div>

        <!-- Куда -->
        <div class="field" style="margin-bottom: 10px;">
          <div class="pin" style="background: var(--accent);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.6" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div style="flex:1; min-width:0;">
            <div class="label">Куда</div>
            <div class="value">Химки, БЦ «Кантри»</div>
          </div>
        </div>

        <!-- Info pill -->
        <div style="display:flex; align-items:center; gap:8px; padding: 10px 14px; background: var(--ink); border:2px solid var(--ink); border-radius:999px; margin-bottom: 14px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFC107" stroke-width="2.6" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span style="color: var(--accent); font-family:'Space Grotesk'; font-weight:700; font-size:12px; letter-spacing:0.04em; text-transform:uppercase;">~24 км по карте · 38 мин</span>
        </div>

        <!-- Цель -->
        <div class="field" style="margin-bottom: 10px;">
          <div class="pin" style="background: var(--bg);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.4" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </div>
          <div style="flex:1;">
            <div class="label">Цель поездки</div>
            <div class="value">Переговоры с партнёром</div>
          </div>
        </div>

        <!-- Авто -->
        <div class="field" style="margin-bottom: 18px;">
          <div class="pin" style="background: var(--bg);">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.4" stroke-linecap="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
          </div>
          <div style="flex:1;">
            <div class="label">Автомобиль</div>
            <div class="value">Toyota Camry · А123АА77</div>
          </div>
        </div>

        <div style="margin-top:auto;">
          <button class="btn-primary">Создать и начать →</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
