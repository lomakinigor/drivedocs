<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Новая поездка (Material You)</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,600;8..144,700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAF8F6; --surface: #FFFBFE; --surface-2: #F3EDF7;
    --primary: #006A6A; --primary-container: #6FF7F7; --on-primary: #FFFFFF; --on-primary-container: #002020;
    --secondary-container: #CCE8E7; --tertiary-container: #D3E4FF;
    --on-surface: #191C1C; --on-surface-variant: #3F4948; --outline: #6F7979; --outline-variant: #BEC9C8;
  }
  body { font-family: 'Roboto Flex', -apple-system, sans-serif; font-variation-settings: "wght" 400; background: #d6d3d1; min-height: 100vh; padding: 32px 16px 64px; color: var(--on-surface); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-weight: 500; font-size: 22px; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: #57534e; margin-bottom: 24px; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 500; font-size: 15px; }
  .content { flex:1; padding: 0 16px 16px; display:flex; flex-direction:column; }
  .btn-primary { width:100%; padding: 16px; border-radius: 100px; background: var(--primary); color: var(--on-primary); font-weight: 500; font-size: 14px; border: none; }
  .field { position: relative; border: 1px solid var(--outline); border-radius: 4px; padding: 18px 16px 8px; margin-bottom: 12px; background: var(--bg); }
  .field.focused { border: 2px solid var(--primary); padding: 17px 15px 7px; }
  .field-label { position:absolute; top: -7px; left: 12px; padding: 0 4px; background: var(--bg); font-size: 12px; color: var(--on-surface-variant); }
  .field.focused .field-label { color: var(--primary); }
  .field-value { font-size: 16px; color: var(--on-surface); display:flex; align-items:center; justify-content: space-between; }
  .supporting { font-size: 12px; color: var(--on-surface-variant); padding: 4px 16px; margin-top: -8px; margin-bottom: 12px; }
  .icons { display:flex; gap:6px; align-items:center; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Новая поездка — Material You</div>
  <div class="sub">M3 outlined fields, top app bar, pill CTA</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#191C1C"/><rect x="5" y="6" width="3" height="6" fill="#191C1C"/><rect x="10" y="3" width="3" height="9" fill="#191C1C"/><rect x="15" y="0" width="3" height="12" fill="#191C1C"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#191C1C" opacity="0.5"/><rect x="2" y="2" width="19" height="8" fill="#191C1C"/><rect x="23.5" y="4" width="2" height="4" fill="#191C1C" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="content">

      <!-- M3 Top app bar with close -->
      <div style="display:flex; align-items:center; justify-content:space-between; padding: 12px 4px 14px;">
        <div style="display:flex; align-items:center; gap:14px;">
          <button style="width:40px; height:40px; border-radius:50%; background:transparent; border:none;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#191C1C" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <span style="font-weight:500; font-size:18px;">Новая поездка</span>
        </div>
      </div>

      <div style="padding: 8px 4px 16px;">

        <!-- Field: Откуда -->
        <div class="field focused">
          <div class="field-label">Откуда</div>
          <div class="field-value">
            <span>ул. Ленина, 12</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#006A6A" stroke-width="2" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
        </div>

        <!-- Field: Куда -->
        <div class="field">
          <div class="field-label">Куда</div>
          <div class="field-value">
            <span>г. Химки, склад №3</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3F4948" stroke-width="2" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
        </div>
        <div class="supporting">~24 км по карте</div>

        <!-- Field: Цель -->
        <div class="field">
          <div class="field-label">Цель поездки</div>
          <div class="field-value">
            <span>Доставка товара</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3F4948" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <!-- Field: Автомобиль -->
        <div class="field">
          <div class="field-label">Автомобиль</div>
          <div class="field-value">
            <span>Toyota Camry · А123АА77</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3F4948" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

      </div>

      <div style="flex:1;"></div>

      <button class="btn-primary">Создать документы и начать</button>

    </div>
  </div>
</div>
</body>
</html>
