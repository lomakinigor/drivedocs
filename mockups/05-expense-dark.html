<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Новый расход</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0B0B0F;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --ink: #F5F5F7;
    --muted: rgba(245,245,247,0.55);
    --gold: #D4AF37;
    --gold-glow: rgba(212,175,55,0.35);
  }
  body { font-family: 'Inter', sans-serif; background: #1c1917; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; color: var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'Playfair Display'; font-weight: 700; font-size: 24px; color: #F5F5F7; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; font-style: italic; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #000; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px var(--gold-glow); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #000; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 15px; color: var(--ink); }
  .app { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .app::before { content:""; position:absolute; top:-200px; right:-200px; width:500px; height:500px; background: radial-gradient(circle, var(--gold-glow), transparent 60%); pointer-events:none; }
  .content { flex: 1; padding: 6px 20px 18px; position: relative; z-index: 1; display: flex; flex-direction: column; }
  .glass { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; backdrop-filter: blur(20px); }
  .btn-primary { width:100%; padding: 18px; border-radius: 22px; background: linear-gradient(135deg, var(--gold) 0%, #B8941F 100%); color: #1A1410; font-weight: 700; font-size: 15px; border: none; box-shadow: 0 8px 32px var(--gold-glow); letter-spacing: 0.02em; cursor:pointer; }
  .icons { display:flex; gap:6px; align-items:center; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; padding: 4px 0 12px; }
  .close { width: 36px; height: 36px; border-radius: 12px; background: var(--card-bg); border: 1px solid var(--card-border); display:flex; align-items:center; justify-content:center; color: var(--ink); cursor:pointer; }
  h1.h { font-family: 'Playfair Display'; font-weight: 700; font-size: 22px; letter-spacing: -0.02em; color: var(--ink); }
  h1.h em { font-style: italic; color: var(--gold); font-weight: 500; }
  .label { font-size: 10px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
  .field { padding: 13px 14px; display:flex; align-items:center; gap: 10px; }
  .val { flex:1; font-size: 14px; color: var(--ink); font-weight: 500; }
  .group { margin-bottom: 12px; }
  .camera-btn { padding: 22px; border-radius: 20px; background: linear-gradient(135deg, rgba(212,175,55,0.18), rgba(212,175,55,0.05)); border: 1px dashed rgba(212,175,55,0.4); display:flex; flex-direction:column; align-items:center; gap: 10px; cursor: pointer; }
  .camera-icon { width: 56px; height: 56px; border-radius: 50%; background: rgba(212,175,55,0.18); border: 1px solid rgba(212,175,55,0.35); display:flex; align-items:center; justify-content:center; box-shadow: 0 0 24px var(--gold-glow); }
  .camera-text { font-family: 'Playfair Display'; font-weight: 600; font-size: 15px; color: var(--gold); font-style: italic; }
  .camera-hint { font-size: 11px; color: var(--muted); }
  .divider { display:flex; align-items:center; gap: 12px; margin: 14px 0; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--card-border); }
  .divider span { font-family: 'Playfair Display'; font-style: italic; font-size: 12px; color: var(--muted); }
  .amount-input { font-family: 'Playfair Display'; font-weight: 700; font-size: 28px; color: var(--gold); background: none; border: none; outline: none; width:100%; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Новый расход — Dark Premium</div>
  <div class="sub">Modal-форма добавления расхода</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#F5F5F7"/><rect x="5" y="6" width="3" height="6" fill="#F5F5F7"/><rect x="10" y="3" width="3" height="9" fill="#F5F5F7"/><rect x="15" y="0" width="3" height="12" fill="#F5F5F7"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#F5F5F7"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#F5F5F7" opacity="0.5"/><rect x="2" y="2" width="19" height="8" fill="#F5F5F7"/><rect x="23.5" y="4" width="2" height="4" fill="#F5F5F7" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <div class="modal-header">
          <h1 class="h">Новый <em>расход</em></h1>
          <button class="close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="camera-btn">
          <div class="camera-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </div>
          <div class="camera-text">Сфотографировать чек</div>
          <div class="camera-hint">распознаем сумму и категорию</div>
        </div>

        <div class="divider"><span>или вручную</span></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="group" style="margin-bottom:0;">
            <div class="label">Категория</div>
            <div class="glass field">
              <div class="val">⛽ Бензин</div>
              <span style="color: var(--muted);">▼</span>
            </div>
          </div>
          <div class="group" style="margin-bottom:0;">
            <div class="label">Дата</div>
            <div class="glass field">
              <div class="val">8 мая</div>
            </div>
          </div>
        </div>

        <div class="group" style="margin-top: 10px;">
          <div class="label">Сумма</div>
          <div class="glass field" style="padding: 14px 16px;">
            <input class="amount-input" value="650 ₽">
          </div>
        </div>

        <div class="group">
          <div class="label">Примечание</div>
          <div class="glass field">
            <div class="val" style="color: var(--muted); font-weight: 400; font-style: italic;">АЗС Лукойл, 30 л АИ-95</div>
          </div>
        </div>

        <div style="flex:1;"></div>

        <button class="btn-primary">Сохранить</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
