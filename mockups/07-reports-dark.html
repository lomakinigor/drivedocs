<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Отчёты</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0B0B0F;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --ink: #F5F5F7;
    --muted: rgba(245,245,247,0.55);
    --gold: #D4AF37;
    --gold-glow: rgba(212,175,55,0.35);
    --emerald: #34D399;
  }
  body { font-family: 'Inter', sans-serif; background: #1c1917; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; color: var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'Playfair Display'; font-weight: 700; font-size: 24px; color: #F5F5F7; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; font-style: italic; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #000; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px var(--gold-glow); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #000; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 15px; color: var(--ink); }
  .app { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .app::before { content:""; position:absolute; top:-200px; right:-200px; width:500px; height:500px; background: radial-gradient(circle, var(--gold-glow), transparent 60%); pointer-events:none; }
  .content { flex: 1; padding: 8px 18px 14px; position: relative; z-index: 1; overflow: hidden; }
  .glass { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; backdrop-filter: blur(20px); }
  .btn-primary { width:100%; padding: 16px; border-radius: 18px; background: linear-gradient(135deg, var(--gold) 0%, #B8941F 100%); color: #1A1410; font-weight: 700; font-size: 14px; border: none; box-shadow: 0 8px 32px var(--gold-glow); letter-spacing: 0.02em; cursor:pointer; display:flex; align-items:center; justify-content:center; gap: 8px; }
  .icons { display:flex; gap:6px; align-items:center; }
  h1.h { font-family: 'Playfair Display'; font-weight: 700; font-size: 30px; letter-spacing: -0.02em; color: var(--ink); padding: 4px 0 18px; }
  h1.h em { font-style: italic; color: var(--gold); font-weight: 500; }
  .highlight { padding: 20px; background: linear-gradient(135deg, rgba(212,175,55,0.18), rgba(212,175,55,0.04)); border: 1px solid rgba(212,175,55,0.4); position: relative; overflow:hidden; }
  .highlight::before { content:""; position:absolute; top:-60px; right:-60px; width: 180px; height: 180px; background: radial-gradient(circle, var(--gold-glow), transparent 70%); pointer-events:none; }
  .badge-ready { display:inline-flex; align-items:center; gap: 5px; padding: 4px 10px; border-radius: 999px; background: rgba(52,211,153,0.15); color: var(--emerald); font-size: 11px; font-weight: 600; }
  .month-name { font-family: 'Playfair Display'; font-weight: 700; font-size: 22px; color: var(--ink); margin-top: 10px; }
  .month-name em { font-style: italic; color: var(--gold); font-weight: 500; }
  .h-stats { display:flex; gap: 14px; margin: 14px 0 16px; align-items:flex-end; }
  .h-stat-num { font-family: 'Playfair Display'; font-weight: 700; font-size: 24px; color: var(--gold); line-height: 1; }
  .h-stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
  .h-sep { width: 1px; height: 30px; background: var(--card-border); align-self:center; }
  .section-title { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin: 16px 4px 10px; }
  .month-card { padding: 16px; display:flex; align-items:center; gap: 14px; }
  .m-icon { width: 44px; height: 44px; border-radius: 14px; background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .m-info { flex:1; min-width:0; }
  .m-name { font-family: 'Playfair Display'; font-weight: 600; font-size: 15px; color: var(--ink); }
  .m-meta { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; }
  .m-tag { font-size: 10px; color: var(--gold); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
  .chip-row { display:flex; gap: 8px; flex-wrap: wrap; }
  .chip { padding: 7px 14px; border-radius: 999px; background: var(--card-bg); border: 1px solid var(--card-border); color: var(--muted); font-size: 12px; font-weight: 500; backdrop-filter: blur(10px); }
  .nav { height: 78px; background: rgba(11,11,15,0.85); backdrop-filter: blur(30px); border-top: 1px solid var(--card-border); display: flex; padding: 8px 12px 24px; }
  .nav-i { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px; color: var(--muted); font-size: 10px; font-weight: 500; letter-spacing: 0.04em; }
  .nav-i.on { color: var(--gold); }
  .nav-i svg { width: 22px; height: 22px; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Отчёты — Dark Premium</div>
  <div class="sub">Месячные отчёты для бухгалтерии</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#F5F5F7"/><rect x="5" y="6" width="3" height="6" fill="#F5F5F7"/><rect x="10" y="3" width="3" height="9" fill="#F5F5F7"/><rect x="15" y="0" width="3" height="12" fill="#F5F5F7"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#F5F5F7"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#F5F5F7" opacity="0.5"/><rect x="2" y="2" width="19" height="8" fill="#F5F5F7"/><rect x="23.5" y="4" width="2" height="4" fill="#F5F5F7" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <h1 class="h"><em>Отчёты</em></h1>

        <div class="glass highlight">
          <div style="display:flex; justify-content:space-between; align-items:center; position:relative;">
            <span class="badge-ready">● готов</span>
            <span style="font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;">PDF · XLSX</span>
          </div>
          <div class="month-name">Апрель <em>2026</em></div>
          <div class="h-stats">
            <div><div class="h-stat-num">22</div><div class="h-stat-label">поездки</div></div>
            <div class="h-sep"></div>
            <div><div class="h-stat-num">1 240</div><div class="h-stat-label">км</div></div>
            <div class="h-sep"></div>
            <div><div class="h-stat-num">18 500</div><div class="h-stat-label">₽</div></div>
          </div>
          <button class="btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1A1410" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Выгрузить в бухгалтерию
          </button>
        </div>

        <div class="section-title">Текущий месяц</div>
        <div class="glass month-card">
          <div class="m-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </div>
          <div class="m-info">
            <div class="m-name">Май 2026</div>
            <div class="m-meta">8 поездок · 312 км · 4 800 ₽</div>
          </div>
          <div class="m-tag">текущий</div>
        </div>

        <div class="section-title">Прошлые месяцы</div>
        <div class="chip-row">
          <span class="chip">Март</span>
          <span class="chip">Февраль</span>
          <span class="chip">Январь</span>
        </div>
      </div>

      <div class="nav">
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Сегодня
        </div>
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
          Поездки
        </div>
        <div class="nav-i on">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Отчёты
        </div>
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Настройки
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
