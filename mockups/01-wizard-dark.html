<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Wizard 5/5</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0B0B0F;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --ink: #F5F5F7;
    --muted: rgba(245,245,247,0.55);
    --gold: #D4AF37;
    --gold-glow: rgba(212,175,55,0.35);
    --emerald: #34D399;
  }
  body { font-family: 'Inter', sans-serif; background: #1c1917; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; color: var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'Playfair Display'; font-weight: 700; font-size: 24px; color: #F5F5F7; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 24px; font-style: italic; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #000; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px var(--gold-glow); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #000; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 15px; color: var(--ink); }
  .app { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .app::before { content:""; position:absolute; top:-200px; right:-200px; width:500px; height:500px; background: radial-gradient(circle, var(--gold-glow), transparent 60%); pointer-events:none; }
  .content { flex: 1; padding: 12px 22px 22px; position: relative; z-index: 1; display: flex; flex-direction: column; }
  .glass { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 18px; backdrop-filter: blur(20px); }
  .btn-primary { width:100%; padding: 18px; border-radius: 22px; background: linear-gradient(135deg, var(--gold) 0%, #B8941F 100%); color: #1A1410; font-weight: 700; font-size: 15px; border: none; box-shadow: 0 8px 32px var(--gold-glow); letter-spacing: 0.02em; cursor:pointer; }
  .btn-secondary { width:100%; padding: 16px; border-radius: 22px; background: var(--card-bg); color: var(--ink); font-weight: 600; font-size: 14px; border: 1px solid var(--card-border); backdrop-filter: blur(10px); cursor:pointer; }
  .icons { display:flex; gap:6px; align-items:center; }
  .progress-text { font-size: 11px; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 999px; margin-top: 8px; overflow:hidden; }
  .progress-fill { height: 100%; width: 100%; background: linear-gradient(90deg, var(--gold), #B8941F); border-radius: 999px; box-shadow: 0 0 12px var(--gold-glow); }
  h1.h { font-family: 'Playfair Display'; font-weight: 700; font-size: 28px; letter-spacing: -0.02em; color: var(--ink); text-align:center; line-height: 1.15; }
  h1.h em { font-style: italic; color: var(--gold); font-weight: 500; }
  .check-circle { width: 92px; height: 92px; border-radius: 50%; background: radial-gradient(circle, rgba(52,211,153,0.25), rgba(52,211,153,0.05) 70%); display:flex; align-items:center; justify-content:center; margin: 0 auto; position: relative; }
  .check-circle::before { content:""; position:absolute; inset:-8px; border-radius:50%; border:1px solid rgba(52,211,153,0.2); }
  .doc-row { display:flex; align-items:center; gap:12px; padding: 14px; }
  .doc-row + .doc-row { border-top: 1px solid var(--card-border); }
  .doc-icon { width:40px; height:40px; border-radius:12px; background: rgba(212,175,55,0.12); border:1px solid rgba(212,175,55,0.25); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .doc-name { font-size: 13px; color: var(--ink); font-weight: 500; line-height: 1.3; }
  .doc-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .desc { text-align:center; font-size: 14px; color: var(--muted); margin-top: 8px; font-style: italic; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Wizard 5/5 — Dark Premium</div>
  <div class="sub">Финал настройки — документы готовы</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#F5F5F7"/><rect x="5" y="6" width="3" height="6" fill="#F5F5F7"/><rect x="10" y="3" width="3" height="9" fill="#F5F5F7"/><rect x="15" y="0" width="3" height="12" fill="#F5F5F7"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#F5F5F7"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#F5F5F7" opacity="0.5"/><rect x="2" y="2" width="19" height="8" fill="#F5F5F7"/><rect x="23.5" y="4" width="2" height="4" fill="#F5F5F7" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <div>
          <div class="progress-text">Шаг 5 из 5</div>
          <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div style="margin-top: 26px;">
          <div class="check-circle">
            <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#34D399" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
          </div>
        </div>

        <h1 class="h" style="margin-top: 18px;">Настройка <em>завершена</em></h1>
        <div class="desc">Документы предприятия готовы</div>

        <div class="glass" style="margin-top: 22px;">
          <div class="doc-row">
            <div class="doc-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div style="flex:1;">
              <div class="doc-name">Приказ об использовании авто</div>
              <div class="doc-meta">PDF · 1 стр.</div>
            </div>
            <span style="color: var(--emerald); font-size: 16px;">✓</span>
          </div>
          <div class="doc-row">
            <div class="doc-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div style="flex:1;">
              <div class="doc-name">Договор аренды у физ. лица</div>
              <div class="doc-meta">PDF · 3 стр.</div>
            </div>
            <span style="color: var(--emerald); font-size: 16px;">✓</span>
          </div>
          <div class="doc-row">
            <div class="doc-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div style="flex:1;">
              <div class="doc-name">Согласие на обработку данных</div>
              <div class="doc-meta">PDF · 1 стр.</div>
            </div>
            <span style="color: var(--emerald); font-size: 16px;">✓</span>
          </div>
        </div>

        <div style="flex:1;"></div>

        <div style="display:flex; flex-direction: column; gap: 10px; margin-top: 16px;">
          <button class="btn-primary">Перейти в приложение</button>
          <button class="btn-secondary">Скачать все (PDF)</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
