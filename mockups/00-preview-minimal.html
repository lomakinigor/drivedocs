<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Onboarding 2/4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAFAFA; --ink: #0A0A0A; --line: #E5E5E5; --line-soft: #F0F0F0;
    --muted: #737373; --muted-2: #A3A3A3; --accent: #2563EB;
  }
  body { font-family: 'Inter', sans-serif; background: #f5f5f4; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; color: var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-weight: 600; font-size: 20px; color: #171717; margin-bottom: 4px; letter-spacing: -0.01em; }
  .sub { text-align: center; font-size: 13px; color: #737373; margin-bottom: 24px; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 15px; color: var(--ink); }
  .icons { display:flex; gap:6px; align-items:center; }
  .app { flex: 1; display: flex; flex-direction: column; padding: 24px; }
  .btn-primary { width:100%; padding: 16px; border-radius: 14px; background: var(--ink); color: white; font-weight: 500; font-size: 15px; border: none; }
  .btn-ghost { width:100%; padding: 14px; background: transparent; color: var(--muted); font-weight: 500; font-size: 14px; border: none; }
  .dot { width:6px; height:6px; border-radius:999px; background: var(--line); }
  .dot.on { background: var(--ink); width: 18px; border-radius: 999px; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Onboarding 2/4 — Modern Minimal</div>
  <div class="sub">Превью функции «Документы автоматически»</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#0A0A0A"/><rect x="5" y="6" width="3" height="6" fill="#0A0A0A"/><rect x="10" y="3" width="3" height="9" fill="#0A0A0A"/><rect x="15" y="0" width="3" height="12" fill="#0A0A0A"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#0A0A0A" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#0A0A0A"/><rect x="23.5" y="4" width="2" height="4" fill="#0A0A0A" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 0 8px;">
        <div style="width: 96px; height: 96px; border: 1px solid var(--line); border-radius: 24px; background: white; display:flex; align-items:center; justify-content:center; margin-bottom: 40px;">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <path d="M9 14h4"/>
            <path d="M13 14l2-2"/>
            <path d="M13 14l2 2"/>
          </svg>
        </div>
        <h1 style="font-weight:600; font-size:28px; letter-spacing:-0.025em; line-height:1.15; margin-bottom: 16px;">Документы — автоматически</h1>
        <p style="font-size:15px; color:var(--muted); line-height:1.5; max-width: 300px;">Создаём путевой лист и маршрутный лист до начала поездки. Никаких бланков и распечаток.</p>
      </div>

      <div style="display:flex; gap:8px; justify-content:center; margin-bottom: 24px;">
        <span class="dot"></span>
        <span class="dot on"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <button class="btn-primary" style="margin-bottom: 4px;">Далее</button>
      <button class="btn-ghost">Пропустить</button>
    </div>
  </div>
</div>
</body>
</html>
