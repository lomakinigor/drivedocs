<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Preview Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FDF6EC; --peach: #FDE3CD; --mint: #E3EEDB;
    --coral: #E07A5F; --coral-soft: #F4B5A1; --forest: #3D5A4A;
    --ink: #1F2926; --muted: #6B6863;
  }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #d6d3d1; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; color: var(--ink); }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'DM Serif Display'; font-weight: 400; font-size: 26px; color: var(--ink); margin-bottom: 4px; }
  .title em { font-style: italic; color: var(--coral); }
  .sub { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 24px; font-style: italic; }
  .phone { width: 390px; height: 844px; background: var(--cream); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 15px; color: var(--ink); }
  .app { flex: 1; display: flex; flex-direction: column; }
  .content { flex: 1; padding: 8px 22px 28px; display:flex; flex-direction:column; }
  h1.h { font-family: 'DM Serif Display'; font-weight: 400; font-size: 36px; line-height: 1.05; letter-spacing: -0.01em; color: var(--ink); }
  h1.h em { font-style: italic; color: var(--coral); }
  .btn-primary { width:100%; padding: 18px; border-radius: 999px; background: var(--coral); color: white; font-weight: 600; font-size: 15px; border: none; box-shadow: 0 4px 18px rgba(224,122,95,0.35); }
  .btn-ghost { width:100%; padding: 14px; background: transparent; color: var(--muted); font-weight: 500; font-size: 14px; border: none; font-style: italic; }
  .icons { display:flex; gap:6px; align-items:center; }
  .blob { position: relative; width: 280px; height: 280px; margin: 18px auto 0; }
  .dots { display:flex; gap:8px; justify-content:center; margin: 18px 0 22px; }
  .dot { width:8px; height:8px; border-radius:50%; background: rgba(31,41,38,0.15); }
  .dot.on { width:28px; border-radius:999px; background: var(--coral); }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Onboarding 2/4 — Wellness <em>Pastel</em></div>
  <div class="sub">слайд автогенерации документов, blob-иллюстрация, dot-progress</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#1F2926"/><rect x="5" y="6" width="3" height="6" fill="#1F2926"/><rect x="10" y="3" width="3" height="9" fill="#1F2926"/><rect x="15" y="0" width="3" height="12" fill="#1F2926"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#1F2926"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#1F2926" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#1F2926"/><rect x="23.5" y="4" width="2" height="4" fill="#1F2926" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <div class="blob">
          <!-- soft cream blob backdrop -->
          <svg viewBox="0 0 280 280" width="280" height="280" style="position:absolute; inset:0;">
            <defs>
              <radialGradient id="g1" cx="50%" cy="45%" r="55%">
                <stop offset="0%" stop-color="#FDE3CD"/>
                <stop offset="100%" stop-color="#FDF1E2"/>
              </radialGradient>
            </defs>
            <path d="M140,18 C200,18 258,60 260,130 C262,200 210,258 140,260 C70,262 24,210 22,140 C20,70 80,18 140,18 Z" fill="url(#g1)"/>
            <!-- mint accent leaf -->
            <ellipse cx="60" cy="80" rx="38" ry="22" fill="#E3EEDB" opacity="0.85" transform="rotate(-25 60 80)"/>
            <!-- coral dot -->
            <circle cx="225" cy="65" r="14" fill="#E07A5F" opacity="0.85"/>
          </svg>

          <!-- document illustration -->
          <div style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:170px; height:200px;">
            <!-- back doc -->
            <div style="position:absolute; left:14px; top:8px; width:130px; height:170px; background:white; border-radius:14px; transform:rotate(-6deg); box-shadow:0 8px 22px rgba(31,41,38,0.10);"></div>
            <!-- front doc -->
            <div style="position:absolute; right:0; bottom:0; width:140px; height:180px; background:white; border-radius:14px; transform:rotate(4deg); box-shadow:0 10px 28px rgba(31,41,38,0.14); padding:16px;">
              <div style="height:6px; background:var(--peach); border-radius:3px; width:70%;"></div>
              <div style="height:4px; background:#EFE8DD; border-radius:2px; width:90%; margin-top:10px;"></div>
              <div style="height:4px; background:#EFE8DD; border-radius:2px; width:80%; margin-top:6px;"></div>
              <div style="height:4px; background:#EFE8DD; border-radius:2px; width:85%; margin-top:6px;"></div>
              <div style="height:4px; background:#EFE8DD; border-radius:2px; width:60%; margin-top:6px;"></div>
              <div style="margin-top:14px; display:flex; gap:6px;">
                <span style="font-size:9px; padding:3px 8px; background:var(--mint); color:var(--forest); border-radius:999px; font-weight:600;">путевой</span>
                <span style="font-size:9px; padding:3px 8px; background:var(--peach); color:var(--coral); border-radius:999px; font-weight:600;">№47</span>
              </div>
              <div style="height:4px; background:#EFE8DD; border-radius:2px; width:90%; margin-top:14px;"></div>
              <div style="height:4px; background:#EFE8DD; border-radius:2px; width:55%; margin-top:6px;"></div>
            </div>
            <!-- coral check badge -->
            <div style="position:absolute; right:-6px; top:-2px; width:46px; height:46px; border-radius:50%; background:var(--coral); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 22px rgba(224,122,95,0.45); border:4px solid var(--cream);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
          </div>
        </div>

        <div style="text-align:center; margin-top: 26px;">
          <span style="display:inline-block; padding:5px 12px; border-radius:999px; background:var(--mint); color:var(--forest); font-size:11px; font-weight:600; letter-spacing:0.04em; font-style:italic;">шаг 2 из 4</span>
          <h1 class="h" style="margin-top:12px;">Документы — <em>автоматически</em></h1>
          <div style="font-size:14px; color:var(--muted); margin-top:10px; line-height:1.5; padding: 0 6px;">Создаём путевой лист до начала поездки.<br>Никаких бланков и распечаток.</div>
        </div>

        <div class="dots">
          <span class="dot"></span>
          <span class="dot on"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>

        <div style="margin-top:auto;">
          <button class="btn-primary">Далее</button>
          <button class="btn-ghost">Пропустить</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
