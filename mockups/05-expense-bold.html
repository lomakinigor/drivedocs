<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Bold — Новый расход</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --primary:#FF5722; --accent:#FFC107; --bg:#FFF8F3; --ink:#0A0A0A; --slate-500:#6B7280; --green:#00C853; }
  body { font-family: 'Inter', sans-serif; background: #d6d3d1; min-height: 100vh; padding: 32px 16px 64px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 480px; margin: 0 auto; }
  .title { text-align: center; font-family: 'Space Grotesk'; font-weight: 700; font-size: 22px; color: #292524; margin-bottom: 4px; }
  .sub { text-align: center; font-size: 13px; color: #78716c; margin-bottom: 24px; }
  .phone { width: 390px; height: 844px; background: var(--bg); border-radius: 48px; border: 12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden; position: relative; display: flex; flex-direction: column; margin: 0 auto; }
  .notch { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 30px; background: #18181b; border-radius: 18px; z-index: 10; }
  .status { height: 44px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; font-family: 'Space Grotesk'; font-weight: 600; font-size: 15px; }
  .icons { display:flex; gap:6px; align-items:center; }
  .app { flex: 1; display: flex; flex-direction: column; }
  .content { flex: 1; padding: 6px 22px 20px; display:flex; flex-direction:column; }
  h1.h { font-family: 'Space Grotesk'; font-weight: 700; font-size: 26px; letter-spacing: -0.02em; text-transform: uppercase; }
  .field { background: white; border: 2px solid var(--ink); border-radius: 18px; padding: 10px 14px; }
  .label { font-family:'Space Grotesk'; font-weight:700; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color: var(--slate-500); }
  .btn-primary { width:100%; padding: 18px; border-radius: 22px; background: var(--ink); color: white; font-weight: 700; font-size: 16px; font-family: 'Space Grotesk'; border: none; display:flex; align-items:center; justify-content:center; gap: 10px; box-shadow: 6px 6px 0 var(--primary); text-transform:uppercase; }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Modal — новый расход</div>
  <div class="sub">Bold &amp; Bright — добавление расхода</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#0A0A0A"/><rect x="5" y="6" width="3" height="6" fill="#0A0A0A"/><rect x="10" y="3" width="3" height="9" fill="#0A0A0A"/><rect x="15" y="0" width="3" height="12" fill="#0A0A0A"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5z" fill="#0A0A0A"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#0A0A0A" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#0A0A0A"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <!-- Header -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 14px;">
          <h1 class="h">Новый расход</h1>
          <button style="width:40px; height:40px; border-radius:12px; background:white; border:2px solid var(--ink); display:flex; align-items:center; justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.6" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <!-- Big green camera button -->
        <button style="width:100%; background: var(--green); border: 2px solid var(--ink); border-radius: 22px; padding: 22px; box-shadow: 6px 6px 0 var(--ink); display:flex; align-items:center; justify-content:center; gap: 14px; color: white; font-family:'Space Grotesk'; font-weight:700; font-size:15px; text-transform:uppercase; margin-bottom: 16px;">
          <div style="width: 44px; height:44px; background: var(--ink); border:2px solid white; border-radius: 14px; display:flex; align-items:center; justify-content:center;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </div>
          Сфотографировать чек
        </button>

        <!-- Divider -->
        <div style="display:flex; align-items:center; gap:10px; margin-bottom: 16px;">
          <div style="flex:1; height: 2px; background: var(--ink);"></div>
          <span style="font-family:'Space Grotesk'; font-weight:700; font-size:11px; letter-spacing:0.16em; color: var(--ink);">— ИЛИ —</span>
          <div style="flex:1; height: 2px; background: var(--ink);"></div>
        </div>

        <!-- Категория -->
        <div class="field" style="margin-bottom: 8px;">
          <div class="label" style="margin-bottom: 6px;">Категория</div>
          <div style="display:flex; align-items:center; justify-content:space-between;">
            <span style="display:inline-flex; align-items:center; gap:8px; background: var(--primary); border:2px solid var(--ink); padding: 6px 14px; border-radius:999px; color:white; font-family:'Space Grotesk'; font-weight:700; font-size:12px; letter-spacing:0.04em; text-transform:uppercase;">⛽ Бензин</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.6" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <!-- Сумма -->
        <div class="field" style="margin-bottom: 8px;">
          <div class="label" style="margin-bottom: 4px;">Сумма</div>
          <div style="font-family:'Space Grotesk'; font-weight:700; font-size:36px; color: var(--ink); letter-spacing: -0.02em;">650 ₽</div>
        </div>

        <!-- Дата -->
        <div class="field" style="margin-bottom: 8px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div class="label">Дата</div>
            <div style="font-family:'Space Grotesk'; font-weight:700; font-size:15px; margin-top:2px;">8 мая 2026</div>
          </div>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.4" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>

        <!-- Примечание -->
        <div class="field" style="margin-bottom: 14px;">
          <div class="label" style="margin-bottom: 4px;">Примечание</div>
          <div style="font-family: 'Inter'; font-weight: 500; font-size: 13px; color: var(--slate-500);">АЗС Лукойл, ул. Ленина</div>
        </div>

        <div style="margin-top:auto;">
          <button class="btn-primary">Сохранить →</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
