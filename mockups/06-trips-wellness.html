<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DriveDocs — Trips Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream:#FDF6EC; --peach:#FDE3CD; --mint:#E3EEDB; --coral:#E07A5F; --forest:#3D5A4A; --ink:#1F2926; --muted:#6B6863; }
  body { font-family:'Plus Jakarta Sans', sans-serif; background:#d6d3d1; min-height:100vh; padding: 32px 16px 64px; color:var(--ink); }
  .wrap { max-width:480px; margin:0 auto; }
  .title { text-align:center; font-family:'DM Serif Display'; font-weight:400; font-size:26px; margin-bottom:4px; }
  .title em { font-style:italic; color:var(--coral); }
  .sub { text-align:center; font-size:13px; color:var(--muted); margin-bottom:24px; font-style:italic; }
  .phone { width:390px; height:844px; background:var(--cream); border-radius:48px; border:12px solid #18181b; box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow:hidden; position:relative; display:flex; flex-direction:column; margin:0 auto; }
  .notch { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:120px; height:30px; background:#18181b; border-radius:18px; z-index:10; }
  .status { height:44px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; font-weight:600; font-size:15px; }
  .icons { display:flex; gap:6px; align-items:center; }
  .app { flex:1; display:flex; flex-direction:column; }
  .content { flex:1; padding: 4px 18px 12px; }
  h1.h { font-family:'DM Serif Display'; font-weight:400; font-size:32px; line-height:1.05; }
  h1.h em { font-style:italic; color:var(--coral); }
  .nav { height:78px; background:rgba(253,246,236,0.92); backdrop-filter:blur(20px); border-top:1px solid rgba(31,41,38,0.08); display:flex; padding:8px 12px 24px; }
  .nav-i { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px; color:var(--muted); font-size:11px; font-weight:500; }
  .nav-i.on { color:var(--coral); }
  .nav-i svg { width:22px; height:22px; }
  .num { font-family:'DM Serif Display'; font-weight:400; }
  .trip { background:white; border-radius:20px; padding:12px 14px; display:flex; gap:12px; align-items:center; box-shadow: 0 2px 10px rgba(31,41,38,0.04); }

  .app::-webkit-scrollbar, .phone::-webkit-scrollbar, .content::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .app, .phone, .content { scrollbar-width: none; -ms-overflow-style: none; }

  @media (max-width: 430px) {
    body { padding: 0 !important; background: #000 !important; }
    .wrap { max-width: none !important; }
    .title, .sub, .phone-label { display: none !important; }
    .phone {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
    }
    .notch { display: none !important; }
    .status {
      padding-top: env(safe-area-inset-top, 0px) !important;
      height: calc(44px + env(safe-area-inset-top, 0px)) !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">Поездки — <em>история</em></div>
  <div class="sub">список и помесячная статистика</div>

  <div class="phone">
    <div class="notch"></div>
    <div class="status">
      <span>9:41</span>
      <div class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" fill="#1F2926"/><rect x="5" y="6" width="3" height="6" fill="#1F2926"/><rect x="10" y="3" width="3" height="9" fill="#1F2926"/><rect x="15" y="0" width="3" height="12" fill="#1F2926"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.5l1.5-1.5a2.12 2.12 0 0 0-3 0L8 11.5zM4 7.5L5.5 9a3.54 3.54 0 0 1 5 0L12 7.5a5.66 5.66 0 0 0-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 8-8 0zM1 4.5L2.5 6a7.78 7.78 0 0 1 11 0L15 4.5a9.9 9.9 0 0 0-14 0z" fill="#1F2926"/></svg>
        <svg width="26" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="#1F2926" opacity="0.4"/><rect x="2" y="2" width="19" height="8" fill="#1F2926"/><rect x="23.5" y="4" width="2" height="4" fill="#1F2926" opacity="0.4"/></svg>
      </div>
    </div>

    <div class="app">
      <div class="content">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; padding:8px 0 16px;">
          <div>
            <span style="display:inline-block; padding:5px 12px; border-radius:999px; background:var(--peach); color:var(--coral); font-size:11px; font-weight:600; font-style:italic; letter-spacing:0.04em;">все поездки</span>
            <h1 class="h" style="margin-top:8px;">Поездки</h1>
          </div>
          <button style="width:42px; height:42px; border-radius:50%; background:white; border:none; box-shadow:0 2px 8px rgba(31,41,38,0.06); display:flex; align-items:center; justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F2926" stroke-width="1.8" stroke-linecap="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          </button>
        </div>

        <div style="margin-bottom:14px;">
          <span style="display:inline-flex; align-items:center; gap:8px; padding:8px 14px; border-radius:999px; background:var(--mint); color:var(--forest); font-size:13px; font-weight:600;">
            Май 2026
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#3D5A4A" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>

        <div style="background:var(--mint); border-radius:24px; padding:18px; margin-bottom:18px;">
          <div style="font-size:11px; color:var(--forest); font-weight:600; font-style:italic; letter-spacing:0.04em;">за месяц</div>
          <div style="display:flex; gap:18px; margin-top:10px; align-items:flex-end;">
            <div>
              <div class="num" style="font-size:34px; line-height:1; color:var(--ink);">12</div>
              <div style="font-size:11px; color:var(--forest); font-style:italic; margin-top:2px;">поездок</div>
            </div>
            <div>
              <div class="num" style="font-size:34px; line-height:1; color:var(--ink);">186 <span style="font-size:14px; color:var(--forest); font-style:italic;">км</span></div>
              <div style="font-size:11px; color:var(--forest); font-style:italic; margin-top:2px;">пробег</div>
            </div>
            <div>
              <div class="num" style="font-size:34px; line-height:1; color:var(--ink);">5 240 <span style="font-size:14px; color:var(--forest); font-style:italic;">₽</span></div>
              <div style="font-size:11px; color:var(--forest); font-style:italic; margin-top:2px;">расходы</div>
            </div>
          </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:8px;">
          <div class="trip">
            <div style="width:36px; height:36px; border-radius:50%; background:var(--peach); display:flex; align-items:center; justify-content:center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E07A5F" stroke-width="1.8" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div style="flex:1;">
              <div style="font-family:'DM Serif Display'; font-size:14px;">Ленина <em style="color:var(--coral); font-style:italic;">→</em> Химки</div>
              <div style="font-size:11px; color:var(--muted); font-style:italic;">8 мая · 24 км · 850 ₽</div>
            </div>
            <span style="color:var(--muted); font-size:18px;">›</span>
          </div>
          <div class="trip">
            <div style="width:36px; height:36px; border-radius:50%; background:var(--mint); display:flex; align-items:center; justify-content:center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3D5A4A" stroke-width="1.8" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div style="flex:1;">
              <div style="font-family:'DM Serif Display'; font-size:14px;">Офис <em style="color:var(--coral); font-style:italic;">→</em> Подольск</div>
              <div style="font-size:11px; color:var(--muted); font-style:italic;">7 мая · 38 км · 1 200 ₽</div>
            </div>
            <span style="color:var(--muted); font-size:18px;">›</span>
          </div>
          <div class="trip">
            <div style="width:36px; height:36px; border-radius:50%; background:var(--peach); display:flex; align-items:center; justify-content:center;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E07A5F" stroke-width="1.8" stroke-linecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div style="flex:1;">
              <div style="font-family:'DM Serif Display'; font-size:14px;">Дом <em style="color:var(--coral); font-style:italic;">→</em> Склад №3</div>
              <div style="font-size:11px; color:var(--muted); font-style:italic;">6 мая · 12 км · 320 ₽</div>
            </div>
            <span style="color:var(--muted); font-size:18px;">›</span>
          </div>
        </div>
      </div>

      <div class="nav">
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Сегодня
        </div>
        <div class="nav-i on">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
          Поездки
        </div>
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Отчёты
        </div>
        <div class="nav-i">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Настройки
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
